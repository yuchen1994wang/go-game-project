<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>对弈 - 围棋对练复盘</title>
  <meta name="description" content="在线围棋对弈，支持悔棋、停一手、封盘、AI分析等功能">
  <meta name="keywords" content="围棋,围棋对弈,围棋学习,死活题,棋谱,AI对弈">
  <meta name="author" content="围棋对弈复盘">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="对弈 - 围棋对练复盘">
  <meta property="og:description" content="在线围棋对弈，支持悔棋、停一手、封盘、AI分析等功能">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="theme-color" content="#C4A35A">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .game-page { display: flex; flex-direction: column; min-height: 100vh; }

    header {
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-color);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-left { display: flex; align-items: center; gap: 16px; }

    .game-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 0.9rem;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--bg-secondary);
      border-radius: 16px;
    }

    .meta-label { color: var(--text-secondary); font-size: 0.8rem; }
    .meta-value { font-weight: 500; }

    main {
      flex: 1;
      display: flex;
      padding: 20px;
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    .board-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .board-wrapper {
      position: relative;
      background: linear-gradient(145deg, var(--board-wood-light) 0%, var(--board-wood) 50%, var(--board-dark) 100%);
      border-radius: 8px;
      padding: 30px;
      box-shadow: var(--shadow-medium);
    }

    .goban {
      position: relative;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
      border-radius: 4px;
    }

    .board-grid {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    .grid-line { stroke: var(--line-color); stroke-width: 1; opacity: 0.7; }
    .star-point { fill: var(--line-color); }

    .intersection {
      position: absolute;
      width: 40px;
      height: 40px;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
    }

    .intersection:hover::before {
      content: '';
      position: absolute;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(102, 126, 234, 0.2);
      pointer-events: none;
    }

    .stone {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      position: absolute;
      z-index: 20;
    }

    .stone.black {
      background: radial-gradient(circle at 30% 30%, var(--stone-black-highlight), var(--stone-black) 60%);
      box-shadow: 2px 3px 6px rgba(0, 0, 0, 0.4);
    }

    .stone.white {
      background: radial-gradient(circle at 30% 30%, #ffffff, var(--stone-white) 50%, var(--stone-white-shadow) 100%);
      box-shadow: 2px 3px 6px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0, 0, 0, 0.1);
    }

    .stone.last-move::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-red);
    }

    .stone-number {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 0.7rem;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      z-index: 30;
      pointer-events: none;
    }

    .stone-number.black-text { color: rgba(255,255,255,0.9); }
    .stone-number.white-text { color: rgba(0,0,0,0.7); }

    .control-panel {
      width: 360px;
      background: var(--panel-bg);
      border-radius: 16px;
      box-shadow: var(--shadow-medium);
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      max-height: calc(100vh - 140px);
    }

    .panel-section {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .panel-section:last-child { border-bottom: none; }

    .panel-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 16px;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: 10px;
    }

    .current-player {
      width: 24px;
      height: 24px;
      border-radius: 50%;
    }

    .current-player.black {
      background: radial-gradient(circle at 30% 30%, var(--stone-black-highlight), var(--stone-black));
    }

    .current-player.white {
      background: radial-gradient(circle at 30% 30%, #ffffff, var(--stone-white));
      box-shadow: 0 0 0 1px rgba(0,0,0,0.2);
    }

    .status-text { font-size: 0.95rem; color: var(--text-primary); }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-box {
      text-align: center;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: 10px;
    }

    .stat-label { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 4px; }
    .stat-value { font-size: 1.1rem; font-weight: 600; color: var(--text-primary); }

    .timer-display {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .timer-box {
      flex: 1;
      text-align: center;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: 10px;
    }

    .timer-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .timer-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.2rem;
      font-weight: 600;
    }

    .timer-value.warning { color: var(--accent-red); }

    .move-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 200px;
      overflow-y: auto;
    }

    .move-item {
      padding: 8px 12px;
      background: var(--bg-secondary);
      border-radius: 8px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .move-item:hover { background: var(--board-wood-light); }
    .move-item.active { background: var(--accent-gold); color: white; }
    .move-item.active .move-num { color: rgba(255,255,255,0.8); }

    .move-num {
      color: var(--text-secondary);
      font-weight: 500;
      font-family: 'JetBrains Mono', monospace;
      min-width: 24px;
    }

    .move-stone {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .move-stone.black { background: var(--stone-black); }
    .move-stone.white { background: var(--stone-white); border: 1px solid var(--stone-white-shadow); }

    .move-coord { color: var(--text-secondary); }

    .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-group .btn {
      flex: 1;
      min-width: 80px;
      padding: 10px 14px;
      font-size: 0.85rem;
    }

    .result-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .result-modal.visible { display: flex; }

    .result-content {
      background: var(--card-bg);
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    .result-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-primary);
    }

    .result-details {
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: 20px;
      line-height: 1.6;
    }

    @media (max-width: 900px) {
      main { flex-direction: column; }
      .control-panel { width: 100%; max-height: none; }
    }
  </style>
</head>
<body>
  <div class="game-page">
    <header>
      <div class="header-left">
        <a href="home.html" class="logo">
          <div class="logo-icon"></div>
          <h1>围棋对练</h1>
        </a>
        <div class="game-meta">
          <div class="meta-item">
            <span class="player-indicator black"></span>
            <span class="meta-value" id="blackPlayerName">黑方</span>
          </div>
          <div class="meta-item">
            <span class="player-indicator white"></span>
            <span class="meta-value" id="whitePlayerName">白方</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">棋盘</span>
            <span class="meta-value" id="boardSize">13路</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">手数</span>
            <span class="meta-value" id="moveCount">0手</span>
          </div>
        </div>
      </div>
      <a href="home.html" class="btn btn-secondary">返回首页</a>
    </header>

    <main>
      <section class="board-section">
        <div class="board-wrapper">
          <div class="goban" id="goban"></div>
        </div>
      </section>

      <aside class="control-panel">
        <div class="panel-section">
          <h3 class="panel-title">对局状态</h3>
          <div class="status-row">
            <div class="current-player" id="currentPlayer"></div>
            <span class="status-text" id="statusText">黑方落子</span>
          </div>

          <div class="timer-display">
            <div class="timer-box">
              <div class="timer-label">黑方用时</div>
              <div class="timer-value" id="blackTimer">00:00</div>
            </div>
            <div class="timer-box">
              <div class="timer-label">白方用时</div>
              <div class="timer-value" id="whiteTimer">00:00</div>
            </div>
          </div>

          <div class="stats-grid">
            <div class="stat-box">
              <div class="stat-label">黑方提子</div>
              <div class="stat-value" id="blackCaptures">0</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">白方提子</div>
              <div class="stat-value" id="whiteCaptures">0</div>
            </div>
          </div>
        </div>

        <div class="panel-section">
          <h3 class="panel-title">手数列表</h3>
          <div class="move-list" id="moveList"></div>
        </div>

        <div class="panel-section">
          <h3 class="panel-title">操作</h3>
          <div class="btn-group">
            <button class="btn btn-secondary" id="undoBtn">悔棋</button>
            <button class="btn btn-secondary" id="passBtn">停一手</button>
            <button class="btn btn-secondary" id="pauseBtn">封盘</button>
            <button class="btn btn-danger" id="resignBtn">认输</button>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <div class="result-modal" id="resultModal">
    <div class="result-content">
      <div class="result-title" id="resultTitle">对局结束</div>
      <div class="result-details" id="resultDetails"></div>
      <div style="display: flex; gap: 12px; justify-content: center;">
        <a href="home.html" class="btn btn-secondary">返回首页</a>
        <a href="review.html" class="btn btn-primary" id="reviewBtn">查看复盘</a>
      </div>
    </div>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/error-handler.js"></script>
  <script src="../js/loading.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/board-component.js"></script>
  <script src="../js/game.js"></script>
  <script src="../js/ai.js"></script>
  <script>
    class GameApp {
      constructor() {
        this.game = null;
        this.cellSize = 40;
        this.boardPadding = 30;
        this.timerInterval = null;
        this.init();
      }

      init() {
        ThemeManager.init();

        const params = new URLSearchParams(window.location.search);
        const size = parseInt(params.get('size')) || 13;
        const blackPlayer = params.get('black') || '黑方';
        const whitePlayer = params.get('white') || '白方';

        this.game = new GoGame(size);
        this.game.setPlayerNames(blackPlayer, whitePlayer);

        document.getElementById('blackPlayerName').textContent = blackPlayer;
        document.getElementById('whitePlayerName').textContent = whitePlayer;
        document.getElementById('boardSize').textContent = `${size}路`;

        this.renderBoard();
        this.renderCoords();
        this.updateUI();
        this.startTimer();
        this.bindEvents();
      }

      renderBoard() {
        const goban = document.getElementById('goban');
        const size = this.game.size;
        const boardSize = this.cellSize * (size - 1) + this.boardPadding * 2;

        goban.style.width = `${boardSize}px`;
        goban.style.height = `${boardSize}px`;
        goban.innerHTML = '';

        const svgNS = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(svgNS, 'svg');
        svg.setAttribute('class', 'board-grid');
        svg.setAttribute('width', boardSize);
        svg.setAttribute('height', boardSize);
        svg.setAttribute('viewBox', `0 0 ${boardSize} ${boardSize}`);

        for (let i = 0; i < size; i++) {
          const pos = this.boardPadding + i * this.cellSize;

          const hLine = document.createElementNS(svgNS, 'line');
          hLine.setAttribute('class', 'grid-line');
          hLine.setAttribute('x1', this.boardPadding);
          hLine.setAttribute('y1', pos);
          hLine.setAttribute('x2', boardSize - this.boardPadding);
          hLine.setAttribute('y2', pos);
          svg.appendChild(hLine);

          const vLine = document.createElementNS(svgNS, 'line');
          vLine.setAttribute('class', 'grid-line');
          vLine.setAttribute('x1', pos);
          vLine.setAttribute('y1', this.boardPadding);
          vLine.setAttribute('x2', pos);
          vLine.setAttribute('y2', boardSize - this.boardPadding);
          svg.appendChild(vLine);
        }

        const starPoints = this.getStarPoints(size);
        starPoints.forEach(([x, y]) => {
          const circle = document.createElementNS(svgNS, 'circle');
          circle.setAttribute('class', 'star-point');
          circle.setAttribute('cx', this.boardPadding + x * this.cellSize);
          circle.setAttribute('cy', this.boardPadding + y * this.cellSize);
          circle.setAttribute('r', size === 9 ? 4 : 3);
          svg.appendChild(circle);
        });

        goban.appendChild(svg);

        for (let y = 0; y < size; y++) {
          for (let x = 0; x < size; x++) {
            const intersection = document.createElement('div');
            intersection.className = 'intersection';
            intersection.dataset.x = x;
            intersection.dataset.y = y;
            intersection.style.left = `${this.boardPadding + x * this.cellSize}px`;
            intersection.style.top = `${this.boardPadding + y * this.cellSize}px`;
            goban.appendChild(intersection);
          }
        }
      }

      renderCoords() {
        const goban = document.getElementById('goban');
        const size = this.game.size;
        const letters = 'ABCDEFGHJKLMNOPQRST'.split('');

        const topCoords = document.createElement('div');
        topCoords.className = 'board-coords coord-top';
        for (let i = 0; i < size; i++) {
          const label = document.createElement('span');
          label.className = 'coord-label';
          label.textContent = letters[i] || '';
          topCoords.appendChild(label);
        }
        goban.appendChild(topCoords);

        const bottomCoords = document.createElement('div');
        bottomCoords.className = 'board-coords coord-bottom';
        for (let i = 0; i < size; i++) {
          const label = document.createElement('span');
          label.className = 'coord-label';
          label.textContent = letters[i] || '';
          bottomCoords.appendChild(label);
        }
        goban.appendChild(bottomCoords);

        const leftCoords = document.createElement('div');
        leftCoords.className = 'board-coords coord-left';
        for (let i = 0; i < size; i++) {
          const label = document.createElement('span');
          label.className = 'coord-label';
          label.textContent = size - i;
          leftCoords.appendChild(label);
        }
        goban.appendChild(leftCoords);

        const rightCoords = document.createElement('div');
        rightCoords.className = 'board-coords coord-right';
        for (let i = 0; i < size; i++) {
          const label = document.createElement('span');
          label.className = 'coord-label';
          label.textContent = size - i;
          rightCoords.appendChild(label);
        }
        goban.appendChild(rightCoords);
      }

      getStarPoints(size) {
        const points = [];
        if (size === 9) {
          points.push([2, 2], [2, 6], [4, 4], [6, 2], [6, 6]);
        } else if (size === 13) {
          for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
              points.push([3 + i * 3, 3 + j * 3]);
            }
          }
        } else {
          for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
              points.push([3 + i * 6, 3 + j * 6]);
            }
          }
        }
        return points;
      }

      handleClick(x, y) {
        if (this.game.isGameOver || this.game.isPaused) return;

        const result = this.game.play(x, y);
        if (result.success) {
          this.placeStone(x, y, this.game.currentPlayer === 1 ? 'white' : 'black');
          this.removeLastMoveMarker();
          this.markLastMove(x, y);
          this.updateUI();
          this.updateMoveList();

          if (result.captures > 0) {
            this.removeCapturedStones(result.capturedStones);
            showToast(`提子 ${result.captures} 颗`, 'success');
          }

          if (this.game.isGameOver) {
            this.endGame();
          }
        } else {
          showToast(result.message, 'warning');
        }
      }

      placeStone(x, y, color) {
        const intersection = document.querySelector(`.intersection[data-x="${x}"][data-y="${y}"]`);
        if (!intersection) return;

        const stone = document.createElement('div');
        stone.className = `stone ${color}`;
        intersection.appendChild(stone);
      }

      removeLastMoveMarker() {
        const lastMove = document.querySelector('.stone.last-move');
        if (lastMove) lastMove.classList.remove('last-move');
      }

      markLastMove(x, y) {
        const intersection = document.querySelector(`.intersection[data-x="${x}"][data-y="${y}"]`);
        if (intersection) {
          const stone = intersection.querySelector('.stone');
          if (stone) stone.classList.add('last-move');
        }
      }

      removeCapturedStones(stones) {
        stones.forEach(({x, y}) => {
          const intersection = document.querySelector(`.intersection[data-x="${x}"][data-y="${y}"]`);
          if (intersection) {
            const stone = intersection.querySelector('.stone');
            if (stone) stone.remove();
          }
        });
      }

      updateUI() {
        const playerIndicator = document.getElementById('currentPlayer');
        const statusText = document.getElementById('statusText');

        if (this.game.isGameOver) {
          playerIndicator.className = 'current-player';
          statusText.textContent = '对局结束';
        } else if (this.game.isPaused) {
          playerIndicator.className = 'current-player';
          statusText.textContent = '已封盘';
        } else {
          playerIndicator.className = `current-player ${this.game.currentPlayer === 1 ? 'black' : 'white'}`;
          statusText.textContent = `${this.game.currentPlayer === 1 ? '黑方' : '白方'}落子`;
        }

        document.getElementById('moveCount').textContent = `${this.game.moveHistory.length}手`;
        document.getElementById('blackCaptures').textContent = this.game.capturedBlack;
        document.getElementById('whiteCaptures').textContent = this.game.capturedWhite;

        this.updateTimerDisplay();
      }

      updateMoveList() {
        const moveList = document.getElementById('moveList');
        const move = this.game.moveHistory[this.game.moveHistory.length - 1];
        if (!move) return;

        const item = document.createElement('div');
        item.className = 'move-item active';
        item.dataset.index = this.game.moveHistory.length - 1;

        const num = document.createElement('span');
        num.className = 'move-num';
        num.textContent = this.game.moveHistory.length;

        const stone = document.createElement('span');
        stone.className = `move-stone ${move.player === 1 ? 'black' : 'white'}`;

        const coord = document.createElement('span');
        coord.className = 'move-coord';
        coord.textContent = move.pass ? 'Pass' : `${String.fromCharCode(65 + move.x)}${this.game.size - move.y}`;

        item.appendChild(num);
        item.appendChild(stone);
        item.appendChild(coord);

        item.addEventListener('click', () => this.jumpToMove(parseInt(item.dataset.index)));

        moveList.querySelectorAll('.move-item').forEach(i => i.classList.remove('active'));
        moveList.appendChild(item);
        item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      jumpToMove(index) {
        // 复盘模式：显示到指定手数
        const moves = this.game.moveHistory.slice(0, index + 1);
        this.renderBoard();
        this.renderCoords();

        moves.forEach((move, i) => {
          if (!move.pass) {
            this.placeStone(move.x, move.y, move.player === 1 ? 'black' : 'white');
            if (i === moves.length - 1) {
              this.markLastMove(move.x, move.y);
            }
          }
        });

        document.querySelectorAll('.move-item').forEach((item, i) => {
          item.classList.toggle('active', i === index);
        });
      }

      startTimer() {
        this.timerInterval = setInterval(() => {
          if (!this.game.isGameOver && !this.game.isPaused) {
            if (this.game.currentPlayer === 1) {
              this.game.blackTime++;
            } else {
              this.game.whiteTime++;
            }
            this.updateTimerDisplay();
          }
        }, 1000);
      }

      updateTimerDisplay() {
        const blackTimer = document.getElementById('blackTimer');
        const whiteTimer = document.getElementById('whiteTimer');

        blackTimer.textContent = this.formatTime(this.game.blackTime);
        whiteTimer.textContent = this.formatTime(this.game.whiteTime);

        if (this.game.blackTime > 600) blackTimer.classList.add('warning');
        if (this.game.whiteTime > 600) whiteTimer.classList.add('warning');
      }

      formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
      }

      undo() {
        if (this.game.isGameOver) {
          showToast('对局已结束', 'warning');
          return;
        }

        const result = this.game.undo();
        if (result.success) {
          this.renderBoard();
          this.renderCoords();

          this.game.moveHistory.forEach((move, i) => {
            if (!move.pass) {
              this.placeStone(move.x, move.y, move.player === 1 ? 'black' : 'white');
              if (i === this.game.moveHistory.length - 1) {
                this.markLastMove(move.x, move.y);
              }
            }
          });

          this.updateUI();

          const moveList = document.getElementById('moveList');
          if (moveList.lastChild) moveList.lastChild.remove();

          showToast('已悔棋', 'info');
        } else {
          showToast(result.message, 'warning');
        }
      }

      pass() {
        if (this.game.isGameOver) {
          showToast('对局已结束', 'warning');
          return;
        }

        const result = this.game.pass();
        if (result.success) {
          this.updateUI();
          this.updateMoveList();
          showToast(`${result.player}停一手`, 'info');

          if (this.game.isGameOver) {
            this.endGame();
          }
        }
      }

      pause() {
        if (this.game.isGameOver) return;

        this.game.isPaused = !this.game.isPaused;
        const btn = document.getElementById('pauseBtn');
        btn.textContent = this.game.isPaused ? '继续' : '封盘';
        this.updateUI();

        if (this.game.isPaused) {
          showToast('对局已封盘', 'info');
        }
      }

      resign() {
        if (this.game.isGameOver) return;

        if (confirm('确定要认输吗？')) {
          const result = this.game.resign();
          this.endGame();
        }
      }

      endGame() {
        clearInterval(this.timerInterval);

        const result = this.game.getResult();
        const gameId = Storage.saveGame(this.game);

        document.getElementById('resultTitle').textContent = '🏁 对局结束';
        document.getElementById('resultDetails').innerHTML = `
          <p><strong>${result.winner} 胜！</strong></p>
          <p>黑方：${result.blackArea} 子（含贴目）</p>
          <p>白方：${result.whiteArea} 子</p>
          <p>总手数：${this.game.moveHistory.length} 手</p>
        `;
        document.getElementById('resultModal').classList.add('visible');

        const reviewBtn = document.getElementById('reviewBtn');
        if (gameId) {
          reviewBtn.href = `review.html?id=${gameId}`;
        }
      }

      bindEvents() {
        document.getElementById('goban').addEventListener('click', (e) => {
          const intersection = e.target.closest('.intersection');
          if (intersection) {
            const x = parseInt(intersection.dataset.x);
            const y = parseInt(intersection.dataset.y);
            this.handleClick(x, y);
          }
        });

        document.getElementById('undoBtn').addEventListener('click', () => this.undo());
        document.getElementById('passBtn').addEventListener('click', () => this.pass());
        document.getElementById('pauseBtn').addEventListener('click', () => this.pause());
        document.getElementById('resignBtn').addEventListener('click', () => this.resign());
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      try {
        new GameApp();
      } catch (error) {
        console.error('游戏初始化失败:', error);
        showErrorBoundary('游戏加载失败，请刷新页面重试');
      }
    });
  </script>
</body>
</html>
