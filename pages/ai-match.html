<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI 对弈 - 围棋对弈复盘</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .match-container { display: grid; grid-template-columns: 1fr 320px; gap: 20px; max-width: 1280px; margin: 0 auto; padding: 20px; }
    @media (max-width: 900px) { .match-container { grid-template-columns: 1fr; padding: 10px; } }
    .board-section { display: flex; flex-direction: column; align-items: center; }
    .board-wrapper { position: relative; background: linear-gradient(145deg, var(--board-wood-light) 0%, var(--board-wood) 50%, var(--board-dark) 100%); border-radius: 8px; padding: 25px; box-shadow: var(--shadow-medium); }
    .goban { position: relative; background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%); border-radius: 4px; overflow: visible; touch-action: manipulation; }
    .board-grid { position: absolute; top: 0; left: 0; pointer-events: none; }
    .grid-line { stroke: var(--line-color); stroke-width: 1.5; opacity: 0.8; }
    .star-point { fill: var(--line-color); opacity: 0.8; }
    .intersection { position: absolute; width: 36px; height: 36px; transform: translate(-50%, -50%); cursor: pointer; z-index: 10; -webkit-tap-highlight-color: transparent; }
    .intersection:hover::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 32px; height: 32px; border-radius: 50%; background: rgba(102, 126, 234, 0.3); pointer-events: none; }
    .stone { width: 32px; height: 32px; border-radius: 50%; position: absolute; transform: scale(0); transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 20; }
    .stone.visible { transform: scale(1); }
    .stone.black { background: radial-gradient(circle at 30% 30%, var(--stone-black-highlight), var(--stone-black) 60%); box-shadow: 2px 3px 6px rgba(0, 0, 0, 0.4); }
    .stone.white { background: radial-gradient(circle at 30% 30%, #ffffff, var(--stone-white) 50%, var(--stone-white-shadow) 100%); box-shadow: 2px 3px 6px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0, 0, 0, 0.1); }
    .stone.last-move { box-shadow: 0 0 0 3px rgba(255, 0, 0, 0.6), 2px 3px 6px rgba(0, 0, 0, 0.4); }
    .stone.white.last-move { box-shadow: 0 0 0 3px rgba(255, 0, 0, 0.6), 2px 3px 6px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0, 0, 0, 0.1); }
    .info-panel { background: var(--card-bg); border-radius: 16px; padding: 20px; border: 1px solid var(--border-color); height: fit-content; }
    .game-title { font-family: 'Noto Serif SC', serif; font-size: 1.3rem; font-weight: 600; margin-bottom: 16px; color: var(--text-primary); text-align: center; }
    .status-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 16px; padding: 12px; background: var(--bg-secondary); border-radius: 10px; }
    .current-player { width: 24px; height: 24px; border-radius: 50%; }
    .current-player.black { background: radial-gradient(circle at 30% 30%, var(--stone-black-highlight), var(--stone-black)); }
    .current-player.white { background: radial-gradient(circle at 30% 30%, #ffffff, var(--stone-white)); box-shadow: 0 0 0 1px rgba(0,0,0,0.2); }
    .status-text { font-size: 0.95rem; color: var(--text-primary); }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .stat-box { text-align: center; padding: 12px; background: var(--bg-secondary); border-radius: 10px; }
    .stat-label { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 4px; }
    .stat-value { font-size: 1.1rem; font-weight: 600; color: var(--text-primary); }
    .analysis-section { margin-bottom: 16px; }
    .analysis-title { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; }
    .analysis-content { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.5; padding: 10px; background: var(--bg-secondary); border-radius: 8px; max-height: 120px; overflow-y: auto; }
    .action-buttons { display: flex; flex-direction: column; gap: 10px; }
    .btn { padding: 14px 20px; border-radius: 10px; font-family: inherit; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: all 0.3s ease; border: none; width: 100%; }
    .btn-primary { background: var(--accent-gold); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-medium); }
    .btn-secondary { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-color); }
    .btn-secondary:hover { background: var(--border-color); }
    .btn-danger { background: #FFEBEE; color: #C62828; border: 1px solid #C62828; }
    .btn-danger:hover { background: #FFCDD2; }
    .result-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .result-modal.visible { display: flex; }
    .result-content { background: var(--card-bg); padding: 30px; border-radius: 16px; text-align: center; max-width: 400px; width: 90%; }
    .result-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 16px; color: var(--text-primary); }
    .result-details { font-size: 1rem; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.6; }
    @media (max-width: 900px) {
      .board-wrapper { padding: 15px; }
      .intersection { width: 32px; height: 32px; }
      .stone { width: 28px; height: 28px; }
      .btn { padding: 16px; font-size: 1rem; }
    }
    @media (max-width: 480px) {
      .board-wrapper { padding: 10px; }
      .intersection { width: 26px; height: 26px; }
      .stone { width: 22px; height: 22px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <button class="btn btn-secondary" id="backBtn" style="padding: 8px 16px; font-size: 0.85rem;">← 返回</button>
    </div>

    <div class="match-container">
      <div class="board-section">
        <div class="board-wrapper">
          <div class="goban" id="goban"></div>
        </div>
        <div style="margin-top: 16px; display: flex; gap: 12px;">
          <button class="btn btn-secondary" id="undoBtn">🔙 悔棋</button>
          <button class="btn btn-secondary" id="passBtn">☁️ 停一手</button>
        </div>
      </div>

      <div class="info-panel">
        <div class="game-title">🤖 AI 对弈</div>
        
        <div class="status-row">
          <div class="current-player" id="currentPlayer"></div>
          <span class="status-text" id="statusText">黑方落子</span>
        </div>

        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-label">黑方手数</div>
            <div class="stat-value" id="blackMoves">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">白方手数</div>
            <div class="stat-value" id="whiteMoves">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">黑方提子</div>
            <div class="stat-value" id="blackCaptures">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">白方提子</div>
            <div class="stat-value" id="whiteCaptures">0</div>
          </div>
        </div>

        <div class="analysis-section">
          <div class="analysis-title">📊 局面分析</div>
          <div class="analysis-content" id="analysisContent">
            正在分析...
          </div>
        </div>

        <div class="action-buttons">
          <button class="btn btn-primary" id="hintBtn">💡 AI 建议</button>
          <button class="btn btn-secondary" id="analyzeBtn">🔍 分析局面</button>
          <button class="btn btn-secondary" id="pauseBtn">⏸️ 暂停</button>
          <button class="btn btn-danger" id="newGameBtn">🆕 新局</button>
        </div>
      </div>
    </div>
  </div>

  <div class="result-modal" id="resultModal">
    <div class="result-content">
      <div class="result-title" id="resultTitle">对局结束</div>
      <div class="result-details" id="resultDetails"></div>
      <button class="btn btn-primary" id="closeModal">确定</button>
    </div>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/go-engine.js"></script>
  <script>
    class AIMatch {
      constructor() {
        this.engine = null;
        this.ai = null;
        this.size = 9;
        this.isPaused = false;
        this.isUserTurn = true;
        this.moveHistory = [];
        this.cellSize = 36;
        this.boardPadding = 25;
        this.lastMove = null;
        this.init();
      }

      init() {
        ThemeManager.init();

        const params = new URLSearchParams(window.location.search);
        this.size = parseInt(params.get('size')) || 9;
        const level = params.get('level') || 'medium';

        this.engine = new GoEngine(this.size);
        this.ai = new GoAI(level);

        this.calculateBoardSize();
        this.renderBoard();
        this.updateUI();
        this.updateAnalysis();
        this.bindEvents();

        this.cellSize = this.calculateCellSize();
        this.boardPadding = Math.max(20, this.cellSize);
      }

      calculateCellSize() {
        const container = document.querySelector('.board-section');
        const containerWidth = container ? container.clientWidth - 80 : 300;
        const maxCell = Math.floor(containerWidth / this.size);
        return Math.min(Math.max(maxCell, 20), 40);
      }

      calculateBoardSize() {
        this.cellSize = this.calculateCellSize();
        this.boardPadding = Math.max(20, this.cellSize);
      }

      renderBoard() {
        const goban = document.getElementById('goban');
        const boardSize = this.cellSize * (this.size - 1) + this.boardPadding * 2;

        goban.style.width = boardSize + 'px';
        goban.style.height = boardSize + 'px';
        goban.innerHTML = '';

        const svgNS = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(svgNS, 'svg');
        svg.setAttribute('class', 'board-grid');
        svg.setAttribute('width', boardSize);
        svg.setAttribute('height', boardSize);
        svg.setAttribute('viewBox', '0 0 ' + boardSize + ' ' + boardSize);

        for (let i = 0; i < this.size; i++) {
          const pos = this.boardPadding + i * this.cellSize;
          
          const hLine = document.createElementNS(svgNS, 'line');
          hLine.setAttribute('class', 'grid-line');
          hLine.setAttribute('x1', this.boardPadding);
          hLine.setAttribute('y1', pos);
          hLine.setAttribute('x2', boardSize - this.boardPadding);
          hLine.setAttribute('y2', pos);
          svg.appendChild(hLine);

          const vLine = document.createElementNS(svgNS, 'line');
          vLine.setAttribute('class', 'grid-line');
          vLine.setAttribute('x1', pos);
          vLine.setAttribute('y1', this.boardPadding);
          vLine.setAttribute('x2', pos);
          vLine.setAttribute('y2', boardSize - this.boardPadding);
          svg.appendChild(vLine);
        }

        const starPoints = this.getStarPoints();
        starPoints.forEach(([x, y]) => {
          const circle = document.createElementNS(svgNS, 'circle');
          circle.setAttribute('class', 'star-point');
          circle.setAttribute('cx', this.boardPadding + x * this.cellSize);
          circle.setAttribute('cy', this.boardPadding + y * this.cellSize);
          circle.setAttribute('r', 4);
          svg.appendChild(circle);
        });

        goban.appendChild(svg);

        for (let y = 0; y < this.size; y++) {
          for (let x = 0; x < this.size; x++) {
            const intersection = document.createElement('div');
            intersection.className = 'intersection';
            intersection.dataset.x = x;
            intersection.dataset.y = y;
            intersection.style.left = (this.boardPadding + x * this.cellSize) + 'px';
            intersection.style.top = (this.boardPadding + y * this.cellSize) + 'px';
            goban.appendChild(intersection);
          }
        }
      }

      getStarPoints() {
        const points = [];
        if (this.size === 9) {
          points.push([2, 2], [2, 6], [4, 4], [6, 2], [6, 6]);
        } else if (this.size === 13) {
          for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) points.push([3 + i * 3, 3 + j * 3]);
        } else {
          for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) points.push([3 + i * 6, 3 + j * 6]);
        }
        return points;
      }

      placeStone(x, y, color, animate = true) {
        const intersection = document.querySelector('.intersection[data-x="' + x + '"][data-y="' + y + '"]');
        if (!intersection) return;

        const existingStone = intersection.querySelector('.stone');
        if (existingStone) existingStone.remove();

        const stone = document.createElement('div');
        stone.className = 'stone ' + color;
        intersection.appendChild(stone);
        
        if (animate) {
          requestAnimationFrame(() => stone.classList.add('visible'));
        } else {
          stone.classList.add('visible');
        }
      }

      removeLastMoveMarker() {
        if (this.lastMove) {
          const lastIntersection = document.querySelector('.intersection[data-x="' + this.lastMove.x + '"][data-y="' + this.lastMove.y + '"]');
          if (lastIntersection) {
            const stone = lastIntersection.querySelector('.stone');
            if (stone) stone.classList.remove('last-move');
          }
        }
      }

      handleClick(x, y) {
        if (this.isPaused || !this.isUserTurn) return;
        if (this.engine.board[y][x] !== null) return;

        this.makeMove(x, y, 'black');
        
        if (!this.engine.isTwoPasses()) {
          this.isUserTurn = false;
          this.updateUI();
          
          setTimeout(() => {
            this.aiMove();
          }, 500);
        }
      }

      makeMove(x, y, color) {
        this.removeLastMoveMarker();
        
        if (this.engine.play(x, y)) {
          this.placeStone(x, y, color);
          this.lastMove = { x, y };
          const intersection = document.querySelector('.intersection[data-x="' + x + '"][data-y="' + y + '"]');
          if (intersection) {
            const stone = intersection.querySelector('.stone');
            if (stone) stone.classList.add('last-move');
          }
          
          this.moveHistory.push({ x, y, color });
          this.updateUI();
          this.updateAnalysis();
          
          if (this.engine.isTwoPasses()) {
            this.endGame();
          }
        }
      }

      aiMove() {
        if (this.isPaused) {
          this.isUserTurn = true;
          this.updateUI();
          return;
        }

        const move = this.ai.getMove(this.engine);
        if (move) {
          this.makeMove(move.x, move.y, 'white');
        } else {
          this.engine.pass();
          showToast('AI 停了一手', 'info');
        }
        
        this.isUserTurn = true;
        this.updateUI();
      }

      undo() {
        if (this.moveHistory.length < 2) {
          showToast('没有可悔的棋', 'warning');
          return;
        }

        const lastMove = this.moveHistory.pop();
        this.engine.board[lastMove.y][lastMove.x] = null;
        this.removeLastMoveMarker();
        
        const lastIntersection = document.querySelector('.intersection[data-x="' + lastMove.x + '"][data-y="' + lastMove.y + '"]');
        if (lastIntersection) {
          const stone = lastIntersection.querySelector('.stone');
          if (stone) stone.remove();
        }

        if (this.moveHistory.length > 0) {
          const prevMove = this.moveHistory[this.moveHistory.length - 1];
          this.lastMove = { x: prevMove.x, y: prevMove.y };
          const prevIntersection = document.querySelector('.intersection[data-x="' + prevMove.x + '"][data-y="' + prevMove.y + '"]');
          if (prevIntersection) {
            const stone = prevIntersection.querySelector('.stone');
            if (stone) stone.classList.add('last-move');
          }
        } else {
          this.lastMove = null;
        }

        this.updateUI();
        this.updateAnalysis();
      }

      pass() {
        this.engine.pass();
        this.isUserTurn = false;
        this.updateUI();
        
        setTimeout(() => {
          if (this.engine.isTwoPasses()) {
            this.endGame();
          } else {
            this.aiMove();
          }
        }, 300);
      }

      updateUI() {
        const playerIndicator = document.getElementById('currentPlayer');
        const statusText = document.getElementById('statusText');
        
        playerIndicator.className = 'current-player ' + this.engine.currentPlayer;
        
        if (this.isPaused) {
          statusText.textContent = '已暂停';
        } else if (this.isUserTurn) {
          statusText.textContent = this.engine.currentPlayer === 'black' ? '黑方落子（你）' : '白方落子（AI）';
        } else {
          statusText.textContent = 'AI 思考中...';
        }

        const { black, white } = this.engine.countStones();
        document.getElementById('blackMoves').textContent = Math.floor(this.moveHistory.filter(m => m.color === 'black').length);
        document.getElementById('whiteMoves').textContent = Math.floor(this.moveHistory.filter(m => m.color === 'white').length);
        document.getElementById('blackCaptures').textContent = this.engine.capturedBlack;
        document.getElementById('whiteCaptures').textContent = this.engine.capturedWhite;
      }

      updateAnalysis() {
        const analysis = this.engine.analyzePosition();
        const deadBlack = analysis.groups.filter(g => g.color === 'black' && g.liberties <= 2);
        const deadWhite = analysis.groups.filter(g => g.color === 'white' && g.liberties <= 2);
        
        let text = '';
        
        if (deadBlack.length > 0) {
          text += `⚠️ 你的黑棋有 ${deadBlack.length} 块危险\n`;
          deadBlack.forEach(g => {
            text += `   - ${g.stones.length}子，仅剩 ${g.liberties} 气\n`;
          });
        }
        
        if (deadWhite.length > 0) {
          text += `🎯 可杀白棋 ${deadWhite.length} 块\n`;
          deadWhite.forEach(g => {
            text += `   - ${g.stones.length}子，仅剩 ${g.liberties} 气\n`;
          });
        }

        if (analysis.ataris.length > 0) {
          text += `⚡ 存在对杀局面\n`;
        }

        if (!text) {
          text = '局面平稳，继续下棋！';
        }

        document.getElementById('analysisContent').textContent = text;
      }

      showHint() {
        const move = this.ai.getMove(this.engine);
        if (move) {
          showToast(`AI 建议：(${move.x}, ${move.y})`, 'info');
        } else {
          showToast('当前局面建议停一手', 'info');
        }
      }

      analyzePosition() {
        const analysis = this.engine.analyzePosition();
        let message = `当前局面分析：\n\n`;
        message += `总棋子数：黑 ${analysis.groups.filter(g => g.color === 'black').reduce((s, g) => s + g.stones.length, 0)} 子\n`;
        message += `          白 ${analysis.groups.filter(g => g.color === 'white').reduce((s, g) => s + g.stones.length, 0)} 子\n\n`;
        
        const atari = analysis.ataris;
        if (atari.length > 0) {
          message += `📍 紧急：\n`;
          atari.forEach(g => {
            message += `- ${g.color === 'black' ? '黑' : '白'}方 ${g.stones.length}子危险（${g.liberties}气）\n`;
          });
        }

        showToast(message, 'info');
      }

      pause() {
        this.isPaused = !this.isPaused;
        document.getElementById('pauseBtn').textContent = this.isPaused ? '▶️ 继续' : '⏸️ 暂停';
        this.updateUI();
        
        if (!this.isPaused && !this.isUserTurn) {
          this.aiMove();
        }
      }

      endGame() {
        const { black, white } = this.engine.countStones();
        const komi = this.size === 9 ? 4.5 : 6.5;
        const winner = black > white + komi ? '黑方' : '白方';
        
        this.saveGameToHistory(winner, black, white, komi);
        
        document.getElementById('resultTitle').textContent = '🏁 对局结束';
        document.getElementById('resultDetails').innerHTML = `
          <p><strong>${winner} 胜！</strong></p>
          <p>黑方：${black} 子</p>
          <p>白方（含贴目 ${komi}）：${(white + komi).toFixed(1)} 子</p>
          <p>总手数：${this.moveHistory.length} 手</p>
          <p style="margin-top: 12px; font-size: 0.85rem; color: var(--text-secondary);">
            <a href="review.html" style="color: var(--accent-gold); text-decoration: none;">📖 查看复盘</a>
          </p>
        `;
        document.getElementById('resultModal').classList.add('visible');
      }

      saveGameToHistory(winner, black, white, komi) {
        try {
          const games = JSON.parse(localStorage.getItem('go_game_history') || '[]');
          const game = {
            id: Date.now(),
            date: new Date().toLocaleString('zh-CN'),
            size: this.size,
            level: this.ai.level,
            winner: winner,
            black: black,
            white: white,
            komi: komi,
            totalMoves: this.moveHistory.length,
            moves: this.moveHistory.map(m => ({ x: m.x, y: m.y, color: m.color })),
            type: 'ai',
            blackPlayer: '你',
            whitePlayer: 'AI'
          };
          games.unshift(game);
          if (games.length > 50) games.pop();
          localStorage.setItem('go_game_history', JSON.stringify(games));
        } catch (e) {
          console.error('Failed to save game:', e);
        }
      }

      newGame() {
        this.engine = new GoEngine(this.size);
        this.moveHistory = [];
        this.isUserTurn = true;
        this.isPaused = false;
        this.lastMove = null;
        
        const goban = document.getElementById('goban');
        const stones = goban.querySelectorAll('.stone');
        stones.forEach(s => s.remove());
        
        document.getElementById('pauseBtn').textContent = '⏸️ 暂停';
        document.getElementById('resultModal').classList.remove('visible');
        
        this.updateUI();
        this.updateAnalysis();
        showToast('新对局开始！', 'success');
      }

      bindEvents() {
        document.getElementById('goban').addEventListener('click', (e) => {
          const intersection = e.target.closest('.intersection');
          if (intersection) {
            const x = parseInt(intersection.dataset.x);
            const y = parseInt(intersection.dataset.y);
            this.handleClick(x, y);
          }
        });

        document.getElementById('backBtn').addEventListener('click', () => {
          window.location.href = 'practice.html';
        });

        document.getElementById('undoBtn').addEventListener('click', () => this.undo());
        document.getElementById('passBtn').addEventListener('click', () => this.pass());
        document.getElementById('hintBtn').addEventListener('click', () => this.showHint());
        document.getElementById('analyzeBtn').addEventListener('click', () => this.analyzePosition());
        document.getElementById('pauseBtn').addEventListener('click', () => this.pause());
        document.getElementById('newGameBtn').addEventListener('click', () => this.newGame());
        document.getElementById('closeModal').addEventListener('click', () => {
          document.getElementById('resultModal').classList.remove('visible');
        });

        window.addEventListener('resize', () => {
          this.calculateBoardSize();
          this.renderBoard();
          this.moveHistory.forEach(m => this.placeStone(m.x, m.y, m.color, false));
          if (this.lastMove) {
            const intersection = document.querySelector('.intersection[data-x="' + this.lastMove.x + '"][data-y="' + this.lastMove.y + '"]');
            if (intersection) {
              const stone = intersection.querySelector('.stone');
              if (stone) stone.classList.add('last-move');
            }
          }
        });
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      try { new AIMatch(); } catch (e) { console.error(e); showErrorBoundary('加载失败'); }
    });
  </script>
</body>
</html>
