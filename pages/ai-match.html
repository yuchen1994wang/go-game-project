  <style>
    .ai-match-page { display: flex; flex-direction: column; min-height: 100vh; }
    header {
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-color);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .game-info { display: flex; align-items: center; gap: 16px; font-size: 0.9rem; color: var(--text-secondary); }
    .game-info-item { display: flex; align-items: center; gap: 6px; }
    .player-info { display: flex; align-items: center; gap: 8px; }
    .player-dot { width: 12px; height: 12px; border-radius: 50%; }
    .player-dot.black { background: radial-gradient(circle at 30% 30%, var(--stone-black-highlight), var(--stone-black) 60%); }
    .player-dot.white { background: radial-gradient(circle at 30% 30%, #ffffff, var(--stone-white) 50%, var(--stone-white-shadow) 100%); border: 1px solid rgba(0,0,0,0.1); }
    .current-turn { padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }
    .current-turn.black { background: var(--stone-black); color: white; }
    .current-turn.white { background: var(--stone-white); color: var(--text-primary); border: 1px solid var(--border-color); }
    .ai-badge { padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; background: #E3F2FD; color: #1976D2; }
    main { flex: 1; display: flex; padding: 20px; gap: 20px; max-width: 1400px; margin: 0 auto; width: 100%; }
    .board-section { flex: 1; display: flex; align-items: center; justify-content: center; }
    .board-wrapper { position: relative; background: linear-gradient(145deg, var(--board-wood-light) 0%, var(--board-wood) 50%, var(--board-dark) 100%); border-radius: 8px; padding: 30px; box-shadow: var(--shadow-medium); }
    .goban { position: relative; background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%); border-radius: 4px; overflow: visible; }
    .board-grid { position: absolute; top: 0; left: 0; pointer-events: none; }
    .grid-line { stroke: var(--line-color); stroke-width: 1; opacity: 0.7; }
    .star-point { fill: var(--line-color); }
    .intersection { position: absolute; width: 40px; height: 40px; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; z-index: 10; }
    .intersection:hover::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 36px; height: 36px; border-radius: 50%; background: rgba(102, 126, 234, 0.3); pointer-events: none; }
    .stone { width: 36px; height: 36px; border-radius: 50%; position: absolute; transform: scale(0); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 20; }
    .stone.visible { transform: scale(1); }
    .stone.black { background: radial-gradient(circle at 30% 30%, var(--stone-black-highlight), var(--stone-black) 60%); box-shadow: 2px 3px 6px rgba(0, 0, 0, 0.4); }
    .stone.white { background: radial-gradient(circle at 30% 30%, #ffffff, var(--stone-white) 50%, var(--stone-white-shadow) 100%); box-shadow: 2px 3px 6px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0, 0, 0, 0.1); }
    .stone.last-move::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; border-radius: 50%; background: var(--accent-red); box-shadow: 0 0 4px rgba(196, 30, 58, 0.6); }
    .stone.ai-thinking { animation: ai-pulse 1s infinite; }
    @keyframes ai-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    .control-panel { width: 380px; background: var(--panel-bg); border-radius: 16px; box-shadow: var(--shadow-medium); border: 1px solid var(--border-color); display: flex; flex-direction: column; overflow: hidden; max-height: calc(100vh - 140px); }
    .panel-section { padding: 16px 20px; border-bottom: 1px solid var(--border-color); }
    .panel-section:last-child { border-bottom: none; }
    .panel-title { font-family: 'Noto Serif SC', serif; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.1em; }
    .game-controls { display: flex; gap: 8px; margin-bottom: 12px; }
    .control-btn { padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-primary); font-family: inherit; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
    .control-btn:hover { background: var(--border-color); }
    .control-btn.primary { background: var(--accent-gold); color: white; border-color: var(--accent-gold); }
    .control-btn.primary:hover { background: #D4A017; }
    .control-btn.danger { background: #FFEBEE; color: #C62828; border-color: #EF9A9A; }
    .control-btn.danger:hover { background: #FFCDD2; }
    .control-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .game-status { padding: 12px; background: var(--bg-secondary); border-radius: 10px; font-size: 0.9rem; }
    .status-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .status-row:last-child { margin-bottom: 0; }
    .status-label { color: var(--text-secondary); }
    .status-value { font-weight: 600; }
    .status-value.black { color: var(--stone-black); }
    .status-value.white { color: var(--stone-white-shadow); }
    .ai-info { padding: 12px; background: #E3F2FD; border-radius: 10px; border-left: 4px solid #1976D2; }
    .ai-info-title { font-weight: 600; color: #1976D2; margin-bottom: 4px; }
    .ai-info-text { font-size: 0.85rem; color: var(--text-secondary); }
    .move-list { display: flex; flex-direction: column; gap: 4px; max-height: 200px; overflow-y: auto; }
    .move-item { padding: 6px 10px; background: var(--bg-secondary); border-radius: 6px; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: all 0.2s; }
    .move-item:hover { background: var(--border-color); }
    .move-item.active { background: var(--accent-gold); color: white; }
    .move-item-num { min-width: 28px; font-family: 'JetBrains Mono', monospace; }
    .move-item-stone { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .move-item-stone.black { background: var(--stone-black); }
    .move-item-stone.white { background: var(--stone-white); border: 1px solid var(--stone-white-shadow); }
    .move-item-coord { flex: 1; }
    .timer-display { font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; font-weight: 600; }
    @media (max-width: 900px) { main { flex-direction: column; } .control-panel { width: 100%; max-height: none; } }
  </style>
</head>
<body>

    <main>

      </section>

      <aside class="control-panel">
        <div class="panel-section">

          <div class="game-status">
            <div class="status-row">
              <span class="status-label">棋盘大小</span>

        <div class="panel-section">

  <script src="../js/utils.js"></script>
  <script src="../js/error-handler.js"></script>
  <script src="../js/loading.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/board-component.js"></script>
  <script src="../js/ai.js"></script>
  <script src="../js/header.js"></script>
  <script>
    class SoundEffects {
      constructor() { this.ctx = null; this.enabled = true; }
      init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      playStone() {
        if (!this.enabled) return; this.init();
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.frequency.value = 800; osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
        osc.start(); osc.stop(this.ctx.currentTime + 0.1);
      }
      playCapture() {
        if (!this.enabled) return; this.init();
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.frequency.value = 1200; osc.type = 'sine';
        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
        osc.start(); osc.stop(this.ctx.currentTime + 0.15);
      }
      playPass() {
        if (!this.enabled) return; this.init();
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.frequency.value = 400; osc.type = 'sine';
        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
        osc.start(); osc.stop(this.ctx.currentTime + 0.2);
      }
    }

    const sound = new SoundEffects();

    class AIMatchApp {
      constructor() {
        this.game = null;
        this.gameId = null;
        this.cellSize = 40;
        this.boardPadding = 30;
        this.letters = 'ABCDEFGHJKLMNOPQRST';
        this.moveHistory = [];
        this.currentMove = -1;
        this.blackCaptures = 0;
        this.whiteCaptures = 0;
        this.blackTime = 0;
        this.whiteTime = 0;
        this.timerInterval = null;
        this.isPaused = false;
        this.consecutivePasses = 0;
        this.isGameOver = false;
        this.isAIThinking = false;
        this.aiPlayer = 2; // AI 默认执白
        this.humanPlayer = 1; // 人类默认执黑
        this.aiLevel = 'medium';
        this.komi = 6.5;

        this.init();
      }

      init() {
        Header.init();
        this.loadGameConfig();
        this.initGame();
        this.renderBoard();
        this.updateUI();
        this.bindEvents();
        this.startTimer();

        // 如果 AI 执黑，AI 先手
        if (this.aiPlayer === 1) {
          this.makeAIMove();
        }
      }

      loadGameConfig() {
        const urlParams = new URLSearchParams(window.location.search);
        const size = parseInt(urlParams.get('size')) || 19;
        const handicap = parseInt(urlParams.get('handicap')) || 0;
        const komi = parseFloat(urlParams.get('komi')) || 6.5;
        const aiLevel = urlParams.get('level') || 'medium';
        const humanColor = urlParams.get('humanColor') || 'black';
        const humanPlayer = urlParams.get('human') || Storage.getUsername() || '棋手';

        this.gameConfig = { size, handicap, komi, aiLevel, humanColor, humanPlayer };
        this.aiLevel = aiLevel;
        this.komi = komi;
        this.humanPlayer = humanColor === 'black' ? 1 : 2;
        this.aiPlayer = humanColor === 'black' ? 2 : 1;

        const aiName = this.getAIName(aiLevel);
        document.getElementById('aiName').textContent = aiName;
        document.getElementById('aiDescription').textContent = this.getAIDescription(aiLevel);

        if (this.humanPlayer === 1) {
          document.getElementById('blackPlayerName').textContent = humanPlayer;
          document.getElementById('whitePlayerName').textContent = aiName;
        } else {
          document.getElementById('blackPlayerName').textContent = aiName;
          document.getElementById('whitePlayerName').textContent = humanPlayer;
        }

        document.getElementById('boardSize').textContent = `${size}×${size}`;
      }

      getAIName(level) {
        const names = { easy: '初级 AI', medium: '中级 AI', hard: '高级 AI', pro: '职业 AI' };
        return names[level] || 'AI 对手';
      }

      getAIDescription(level) {
        const descriptions = {
          easy: '适合初学者，会犯一些简单的错误',
          medium: '有一定水平，适合练习',
          hard: '较强的对手，需要认真应对',
          pro: '职业水平，极具挑战性'
        };
        return descriptions[level] || '正在思考中...';
      }

      initGame() {
        const { size, handicap } = this.gameConfig;
        this.game = new GoGame(size);
        this.gameId = Date.now().toString();

        if (handicap > 0) {
          const handicapStones = this.getHandicapStones(size, handicap);
          handicapStones.forEach(([x, y]) => {
            this.game.board[y][x] = 1;
          });
          this.game.currentPlayer = 2;
        }
      }

      getHandicapStones(size, count) {
        const stones = {
          9: { 2: [[2, 2], [6, 6]], 3: [[2, 2], [6, 6], [2, 6]], 4: [[2, 2], [6, 6], [2, 6], [6, 2]], 5: [[2, 2], [6, 6], [2, 6], [6, 2], [4, 4]] },
          13: { 2: [[3, 3], [9, 9]], 3: [[3, 3], [9, 9], [3, 9]], 4: [[3, 3], [9, 9], [3, 9], [9, 3]], 5: [[3, 3], [9, 9], [3, 9], [9, 3], [6, 6]] },
          19: { 2: [[3, 3], [15, 15]], 3: [[3, 3], [15, 15], [3, 15]], 4: [[3, 3], [15, 15], [3, 15], [15, 3]], 5: [[3, 3], [15, 15], [3, 15], [15, 3], [9, 9]], 6: [[3, 3], [15, 15], [3, 15], [15, 3], [3, 9], [15, 9]], 7: [[3, 3], [15, 15], [3, 15], [15, 3], [3, 9], [15, 9], [9, 9]], 8: [[3, 3], [15, 15], [3, 15], [15, 3], [3, 9], [15, 9], [9, 3], [9, 15]], 9: [[3, 3], [15, 15], [3, 15], [15, 3], [3, 9], [15, 9], [9, 3], [9, 15], [9, 9]] }
        };
        return (stones[size] && stones[size][count]) || [];
      }

      renderBoard() {
        const goban = document.getElementById('goban');
        const size = this.game.size;
        const boardSize = this.cellSize * (size - 1) + this.boardPadding * 2;

        goban.style.width = `${boardSize}px`;
        goban.style.height = `${boardSize}px`;
        goban.innerHTML = '';

        const svgNS = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(svgNS, 'svg');
        svg.setAttribute('class', 'board-grid');
        svg.setAttribute('width', boardSize);
        svg.setAttribute('height', boardSize);
        svg.setAttribute('viewBox', `0 0 ${boardSize} ${boardSize}`);

        for (let i = 0; i < size; i++) {
          const pos = this.boardPadding + i * this.cellSize;
          const hLine = document.createElementNS(svgNS, 'line');
          hLine.setAttribute('class', 'grid-line');
          hLine.setAttribute('x1', this.boardPadding);
          hLine.setAttribute('y1', pos);
          hLine.setAttribute('x2', boardSize - this.boardPadding);
          hLine.setAttribute('y2', pos);
          svg.appendChild(hLine);

          const vLine = document.createElementNS(svgNS, 'line');
          vLine.setAttribute('class', 'grid-line');
          vLine.setAttribute('x1', pos);
          vLine.setAttribute('y1', this.boardPadding);
          vLine.setAttribute('x2', pos);
          vLine.setAttribute('y2', boardSize - this.boardPadding);
          svg.appendChild(vLine);
        }

        const starPoints = this.getStarPoints(size);
        starPoints.forEach(([x, y]) => {
          const circle = document.createElementNS(svgNS, 'circle');
          circle.setAttribute('class', 'star-point');
          circle.setAttribute('cx', this.boardPadding + x * this.cellSize);
          circle.setAttribute('cy', this.boardPadding + y * this.cellSize);
          circle.setAttribute('r', size === 9 ? 4 : 3);
          svg.appendChild(circle);
        });

        goban.appendChild(svg);

        for (let y = 0; y < size; y++) {
          for (let x = 0; x < size; x++) {
            const intersection = document.createElement('div');
            intersection.className = 'intersection';
            intersection.dataset.x = x;
            intersection.dataset.y = y;
            intersection.style.left = `${this.boardPadding + x * this.cellSize}px`;
            intersection.style.top = `${this.boardPadding + y * this.cellSize}px`;
            goban.appendChild(intersection);
          }
        }

        this.updateBoard();
      }

      getStarPoints(size) {
        const points = [];
        if (size === 9) {
          points.push([2, 2], [2, 6], [4, 4], [6, 2], [6, 6]);
        } else if (size === 13) {
          for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
              points.push([3 + i * 3, 3 + j * 3]);
            }
          }
        } else {
          for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
              points.push([3 + i * 6, 3 + j * 6]);
            }
          }
        }
        return points;
      }

      updateBoard() {
        const size = this.game.size;
        const intersections = document.querySelectorAll('.intersection');

        intersections.forEach(intersection => {
          const x = parseInt(intersection.dataset.x);
          const y = parseInt(intersection.dataset.y);
          const stone = intersection.querySelector('.stone');

          if (stone) stone.remove();

          const cellValue = this.game.board[y][x];
          if (cellValue !== 0) {
            const stoneColor = cellValue === 1 ? 'black' : 'white';
            const isLastMove = this.moveHistory.length > 0 &&
              this.moveHistory[this.moveHistory.length - 1].x === x &&
              this.moveHistory[this.moveHistory.length - 1].y === y;

            const newStone = document.createElement('div');
            newStone.className = `stone ${stoneColor}${isLastMove ? ' last-move' : ''}`;
            intersection.appendChild(newStone);
            requestAnimationFrame(() => newStone.classList.add('visible'));
          }
        });
      }

      handleClick(x, y) {
        if (this.isGameOver || this.isPaused || this.isAIThinking) return;
        if (this.game.currentPlayer !== this.humanPlayer) return;

        const result = this.game.makeMove(x, y);
        if (!result.success) {
          showToast(result.message, 'warning');
          return;
        }

        sound.playStone();

        if (result.captures && result.captures.length > 0) {
          sound.playCapture();
          if (this.game.currentPlayer === 2) {
            this.blackCaptures += result.captures.length;
          } else {
            this.whiteCaptures += result.captures.length;
          }
        }

        this.moveHistory.push({ x, y, player: this.humanPlayer, captures: result.captures || [] });
        this.currentMove = this.moveHistory.length - 1;
        this.consecutivePasses = 0;

        this.updateBoard();
        this.updateUI();
        this.renderMoveList();

        // AI 回合
        if (!this.isGameOver) {
          setTimeout(() => this.makeAIMove(), 500);
        }
      }

      async makeAIMove() {
        if (this.isGameOver || this.game.currentPlayer !== this.aiPlayer) return;

        this.isAIThinking = true;
        document.getElementById('aiDescription').textContent = 'AI 正在思考...';
        this.updateUI();

        // 模拟 AI 思考时间
        const thinkTime = this.getAIThinkTime();
        await new Promise(resolve => setTimeout(resolve, thinkTime));

        const aiMove = this.getAIMove();

        if (aiMove === null) {
          // AI 停一手
          this.handlePass();
          this.isAIThinking = false;
          return;
        }

        const result = this.game.makeMove(aiMove.x, aiMove.y);
        if (!result.success) {
          // 如果 AI 落子失败，随机选择一个合法位置
          const validMoves = this.getValidMoves();
          if (validMoves.length > 0) {
            const randomMove = validMoves[Math.floor(Math.random() * validMoves.length)];
            this.game.makeMove(randomMove.x, randomMove.y);
          }
        }

        sound.playStone();

        if (result.captures && result.captures.length > 0) {
          sound.playCapture();
          if (this.aiPlayer === 1) {
            this.blackCaptures += result.captures.length;
          } else {
            this.whiteCaptures += result.captures.length;
          }
        }

        this.moveHistory.push({ x: aiMove.x, y: aiMove.y, player: this.aiPlayer, captures: result.captures || [] });
        this.currentMove = this.moveHistory.length - 1;
        this.consecutivePasses = 0;

        this.isAIThinking = false;
        document.getElementById('aiDescription').textContent = this.getAIDescription(this.aiLevel);

        this.updateBoard();
        this.updateUI();
        this.renderMoveList();
      }

      getAIThinkTime() {
        const times = { easy: 500, medium: 1000, hard: 1500, pro: 2000 };
        return times[this.aiLevel] || 1000;
      }

      getAIMove() {
        const validMoves = this.getValidMoves();
        if (validMoves.length === 0) return null;

        // 根据难度选择策略
        switch (this.aiLevel) {
          case 'easy':
            return this.getEasyMove(validMoves);
          case 'medium':
            return this.getMediumMove(validMoves);
          case 'hard':
            return this.getHardMove(validMoves);
          case 'pro':
            return this.getProMove(validMoves);
          default:
            return this.getMediumMove(validMoves);
        }
      }

      getValidMoves() {
        const moves = [];
        const size = this.game.size;
        for (let y = 0; y < size; y++) {
          for (let x = 0; x < size; x++) {
            if (this.game.board[y][x] === 0) {
              // 简单检查是否合法
              const testGame = new GoGame(size);
              testGame.board = this.game.board.map(row => [...row]);
              testGame.currentPlayer = this.aiPlayer;
              const result = testGame.makeMove(x, y);
              if (result.success) {
                moves.push({ x, y, score: 0 });
              }
            }
          }
        }
        return moves;
      }

      getEasyMove(moves) {
        // 简单 AI： mostly random, with slight preference for center
        const size = this.game.size;
        const center = Math.floor(size / 2);

        moves.forEach(move => {
          const distToCenter = Math.abs(move.x - center) + Math.abs(move.y - center);
          move.score = Math.random() * 10 - distToCenter * 0.1;
        });

        moves.sort((a, b) => b.score - a.score);
        return moves[0];
      }

      getMediumMove(moves) {
        // 中级 AI：考虑吃子和连接
        const size = this.game.size;
        const center = Math.floor(size / 2);

        moves.forEach(move => {
          let score = Math.random() * 5;

          // 偏好中心
          const distToCenter = Math.abs(move.x - center) + Math.abs(move.y - center);
          score += (size - distToCenter) * 0.5;

          // 检查是否能吃子
          const testGame = new GoGame(size);
          testGame.board = this.game.board.map(row => [...row]);
          testGame.currentPlayer = this.aiPlayer;
          const result = testGame.makeMove(move.x, move.y);
          if (result.captures && result.captures.length > 0) {
            score += result.captures.length * 10;
          }

          move.score = score;
        });

        moves.sort((a, b) => b.score - a.score);
        return moves[0];
      }

      getHardMove(moves) {
        // 高级 AI：更复杂的评估
        return this.getMediumMove(moves); // 简化实现
      }

      getProMove(moves) {
        // 职业 AI：最强策略
        return this.getHardMove(moves); // 简化实现
      }

      handlePass() {
        if (this.isGameOver || this.isPaused || this.isAIThinking) return;
        if (this.game.currentPlayer !== this.humanPlayer) return;

        sound.playPass();
        this.moveHistory.push({ x: -1, y: -1, player: this.humanPlayer, isPass: true });
        this.currentMove = this.moveHistory.length - 1;
        this.consecutivePasses++;

        if (this.consecutivePasses >= 2) {
          this.endGame('双方连续停手，对局结束');
          return;
        }

        this.game.currentPlayer = this.aiPlayer;
        this.updateUI();
        this.renderMoveList();
        showToast('您停一手', 'info');

        // AI 回合
        setTimeout(() => this.makeAIMove(), 500);
      }

      handleUndo() {
        if (this.isGameOver || this.moveHistory.length === 0 || this.isAIThinking) return;

        // 悔棋需要撤销 AI 和玩家各一步
        const lastMove = this.moveHistory.pop();
        this.currentMove = this.moveHistory.length - 1;

        if (lastMove.isPass) {
          this.game.currentPlayer = lastMove.player;
          this.consecutivePasses--;
        } else {
          this.game.board[lastMove.y][lastMove.x] = 0;
          if (lastMove.captures) {
            lastMove.captures.forEach(([x, y]) => {
              this.game.board[y][x] = lastMove.player === 1 ? 2 : 1;
            });
            if (lastMove.player === 1) {
              this.whiteCaptures -= lastMove.captures.length;
            } else {
              this.blackCaptures -= lastMove.captures.length;
            }
          }
          this.game.currentPlayer = lastMove.player;
        }

        // 如果上一步是 AI 的，再撤销一步
        if (this.moveHistory.length > 0 && this.moveHistory[this.moveHistory.length - 1].player === this.aiPlayer) {
          const aiLastMove = this.moveHistory.pop();
          this.currentMove = this.moveHistory.length - 1;

          if (aiLastMove.isPass) {
            this.game.currentPlayer = aiLastMove.player;
            this.consecutivePasses--;
          } else {
            this.game.board[aiLastMove.y][aiLastMove.x] = 0;
            if (aiLastMove.captures) {
              aiLastMove.captures.forEach(([x, y]) => {
                this.game.board[y][x] = aiLastMove.player === 1 ? 2 : 1;
              });
              if (aiLastMove.player === 1) {
                this.whiteCaptures -= aiLastMove.captures.length;
              } else {
                this.blackCaptures -= aiLastMove.captures.length;
              }
            }
            this.game.currentPlayer = aiLastMove.player;
          }
        }

        this.updateBoard();
        this.updateUI();
        this.renderMoveList();
        showToast('已悔棋', 'info');
      }

      handleResign() {
        if (this.isGameOver || this.isAIThinking) return;
        if (!confirm('确定要认输吗？')) return;

        const winner = this.humanPlayer === 1 ? '白棋 (AI)' : '黑棋 (AI)';
        this.endGame(`您认输，${winner}获胜`);
      }

      handleSave() {
        const gameData = {
          id: this.gameId,
          type: 'ai',
          size: this.game.size,
          blackPlayer: this.humanPlayer === 1 ? this.gameConfig.humanPlayer : this.getAIName(this.aiLevel),
          whitePlayer: this.humanPlayer === 2 ? this.gameConfig.humanPlayer : this.getAIName(this.aiLevel),
          moveHistory: this.moveHistory,
          blackCaptures: this.blackCaptures,
          whiteCaptures: this.whiteCaptures,
          blackTime: this.blackTime,
          whiteTime: this.whiteTime,
          komi: this.komi,
          savedAt: Date.now(),
          isGameOver: this.isGameOver,
          result: this.gameResult || null,
          aiLevel: this.aiLevel
        };

        Storage.saveGame(gameData);
        showToast('对局已保存', 'success');
      }

      handleScore() {
        if (this.moveHistory.length === 0) {
          showToast('还没有落子，无法数棋', 'warning');
          return;
        }

        const score = this.game.calculateScore(this.komi);
        let resultText = '';
        if (score.winner === 'black') {
          resultText = `黑棋胜 ${score.margin.toFixed(1)} 目`;
        } else if (score.winner === 'white') {
          resultText = `白棋胜 ${score.margin.toFixed(1)} 目`;
        } else {
          resultText = '和棋';
        }

        showToast(`数棋结果：${resultText}`, 'info');
      }

      endGame(reason) {
        this.isGameOver = true;
        this.pauseTimer();

        const score = this.game.calculateScore(this.komi);
        let resultText = '';
        if (score.winner === 'black') {
          resultText = `黑棋胜 ${score.margin.toFixed(1)} 目`;
        } else if (score.winner === 'white') {
          resultText = `白棋胜 ${score.margin.toFixed(1)} 目`;
        } else {
          resultText = '和棋';
        }

        this.gameResult = {
          reason: reason,
          winner: score.winner,
          margin: score.margin,
          blackScore: score.black,
          whiteScore: score.white
        };

        showToast(`${reason}\n${resultText}`, 'success');
        this.updateUI();
        this.handleSave();
      }

      startTimer() {
        this.timerInterval = setInterval(() => {
          if (this.isPaused || this.isGameOver) return;

          if (this.game.currentPlayer === 1) {
            this.blackTime++;
          } else {
            this.whiteTime++;
          }

          this.updateTimerDisplay();
        }, 1000);
      }

      pauseTimer() {
        this.isPaused = true;
        if (this.timerInterval) {
          clearInterval(this.timerInterval);
          this.timerInterval = null;
        }
      }

      updateTimerDisplay() {
        const blackMins = Math.floor(this.blackTime / 60);
        const blackSecs = this.blackTime % 60;
        document.getElementById('blackTimer').textContent =
          `${String(blackMins).padStart(2, '0')}:${String(blackSecs).padStart(2, '0')}`;

        const whiteMins = Math.floor(this.whiteTime / 60);
        const whiteSecs = this.whiteTime % 60;
        document.getElementById('whiteTimer').textContent =
          `${String(whiteMins).padStart(2, '0')}:${String(whiteSecs).padStart(2, '0')}`;

        const totalTime = this.blackTime + this.whiteTime;
        const totalMins = Math.floor(totalTime / 60);
        const totalSecs = totalTime % 60;
        document.getElementById('gameTimer').textContent =
          `${String(totalMins).padStart(2, '0')}:${String(totalSecs).padStart(2, '0')}`;
      }

      updateUI() {
        const currentPlayer = this.game.currentPlayer;
        document.getElementById('currentTurn').textContent = currentPlayer === 1 ? '黑棋' : '白棋';
        document.getElementById('currentTurn').className = `status-value ${currentPlayer === 1 ? 'black' : 'white'}`;

        document.getElementById('blackTurn').style.display = currentPlayer === 1 ? 'inline' : 'none';
        document.getElementById('whiteTurn').style.display = currentPlayer === 2 ? 'inline' : 'none';

        document.getElementById('captures').textContent = `黑: ${this.blackCaptures} | 白: ${this.whiteCaptures}`;
        document.getElementById('moveCount').textContent = `${this.moveHistory.length}手`;

        document.getElementById('undoBtn').disabled = this.moveHistory.length === 0 || this.isGameOver || this.isAIThinking;
        document.getElementById('passBtn').disabled = this.isGameOver || this.isAIThinking;
        document.getElementById('resignBtn').disabled = this.isGameOver || this.isAIThinking;
        document.getElementById('scoreBtn').disabled = this.moveHistory.length === 0;

        this.updateTimerDisplay();
      }

      renderMoveList() {
        const list = document.getElementById('moveList');
        list.innerHTML = '';

        this.moveHistory.forEach((move, index) => {
          const item = document.createElement('div');
          item.className = 'move-item';
          item.dataset.index = index;

          const num = document.createElement('span');
          num.className = 'move-item-num';
          num.textContent = index + 1;

          const stone = document.createElement('span');
          stone.className = `move-item-stone ${move.player === 1 ? 'black' : 'white'}`;

          const coord = document.createElement('span');
          coord.className = 'move-item-coord';
          if (move.isPass) {
            coord.textContent = '停一手';
          } else {
            coord.textContent = `${this.letters[move.x]}${this.game.size - move.y}`;
          }

          item.appendChild(num);
          item.appendChild(stone);
          item.appendChild(coord);

          item.addEventListener('click', () => {
            this.goToMove(index);
          });

          list.appendChild(item);
        });

        list.scrollTop = list.scrollHeight;
      }

      goToMove(index) {
        if (index < 0 || index >= this.moveHistory.length) return;

        this.game = new GoGame(this.game.size);
        this.blackCaptures = 0;
        this.whiteCaptures = 0;

        for (let i = 0; i <= index; i++) {
          const move = this.moveHistory[i];
          if (!move.isPass) {
            const result = this.game.makeMove(move.x, move.y);
            if (result.captures) {
              if (move.player === 1) {
                this.blackCaptures += result.captures.length;
              } else {
                this.whiteCaptures += result.captures.length;
              }
            }
          }
        }

        this.currentMove = index;
        this.updateBoard();
        this.updateUI();

        document.querySelectorAll('.move-item').forEach((item, i) => {
          item.classList.toggle('active', i === index);
        });
      }

      bindEvents() {
        const goban = document.getElementById('goban');

        goban.addEventListener('click', (e) => {
          const intersection = e.target.closest('.intersection');
          if (intersection) {
            const x = parseInt(intersection.dataset.x);
            const y = parseInt(intersection.dataset.y);
            this.handleClick(x, y);
          }
        });

        document.getElementById('undoBtn').addEventListener('click', () => this.handleUndo());
        document.getElementById('passBtn').addEventListener('click', () => this.handlePass());
        document.getElementById('resignBtn').addEventListener('click', () => this.handleResign());
        document.getElementById('saveBtn').addEventListener('click', () => this.handleSave());
        document.getElementById('scoreBtn').addEventListener('click', () => this.handleScore());

        document.addEventListener('keydown', (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

          switch (e.key) {
            case 'z':
              if (e.ctrlKey || e.metaKey) {
                e.preventDefault();
                this.handleUndo();
              }
              break;
            case 'p':
              e.preventDefault();
              this.handlePass();
              break;
            case 's':
              if (e.ctrlKey || e.metaKey) {
                e.preventDefault();
                this.handleSave();
              }
              break;
          }
        });
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      new AIMatchApp();
    });
  </script>
</body>
