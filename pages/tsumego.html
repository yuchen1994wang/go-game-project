<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>死活题 - 围棋对弈复盘</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .tsumego-container { display: grid; grid-template-columns: 1fr 340px; gap: 24px; max-width: 1280px; margin: 0 auto; }
    @media (max-width: 900px) { 
      .tsumego-container { grid-template-columns: 1fr; padding: 0 8px; }
      .board-wrapper { padding: 15px !important; }
      .intersection { width: 36px !important; height: 36px !important; }
      .stone { width: 32px !important; height: 32px !important; }
      .info-panel { padding: 16px !important; }
      .btn { padding: 14px 18px !important; font-size: 1rem !important; }
      .action-buttons { gap: 8px; }
      .stat-box { padding: 8px !important; }
    }
    @media (max-width: 480px) {
      .intersection { width: 30px !important; height: 30px !important; }
      .stone { width: 26px !important; height: 26px !important; }
      .problem-title { font-size: 1.1rem !important; }
      .meta-tag { font-size: 0.75rem !important; padding: 3px 8px !important; }
    }
    .board-section { display: flex; flex-direction: column; align-items: center; }
    .board-wrapper { position: relative; background: linear-gradient(145deg, var(--board-wood-light) 0%, var(--board-wood) 50%, var(--board-dark) 100%); border-radius: 8px; padding: 30px; box-shadow: var(--shadow-medium); }
    .goban { position: relative; background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%); border-radius: 4px; overflow: visible; }
    .board-grid { position: absolute; top: 0; left: 0; pointer-events: none; }
    .grid-line { stroke: var(--line-color); stroke-width: 1.5; opacity: 0.8; }
    .star-point { fill: var(--line-color); opacity: 0.8; }
    .intersection { position: absolute; width: 40px; height: 40px; transform: translate(-50%, -50%); cursor: pointer; z-index: 10; }
    .intersection:hover::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 36px; height: 36px; border-radius: 50%; background: rgba(102, 126, 234, 0.3); pointer-events: none; }
    .stone { width: 36px; height: 36px; border-radius: 50%; position: absolute; transform: scale(0); transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 20; pointer-events: none; }
    .stone.visible { transform: scale(1); }
    .stone.black { background: radial-gradient(circle at 30% 30%, var(--stone-black-highlight), var(--stone-black) 60%); box-shadow: 2px 3px 6px rgba(0, 0, 0, 0.4); }
    .stone.white { background: radial-gradient(circle at 30% 30%, #ffffff, var(--stone-white) 50%, var(--stone-white-shadow) 100%); box-shadow: 2px 3px 6px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0, 0, 0, 0.1); }
    .stone.preview { opacity: 0.5; transform: scale(1) !important; pointer-events: none; }
    .stone.wrong-move { animation: shake 0.3s ease-in-out; }
    .stone.correct-move { animation: pulse 0.5s ease-out; }
    @keyframes shake { 0%, 100% { transform: scale(1) translateX(0); } 25% { transform: scale(1) translateX(-5px); } 75% { transform: scale(1) translateX(5px); } }
    @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(46, 125, 50, 0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(46, 125, 50, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(46, 125, 50, 0); } }
    .info-panel { background: var(--card-bg); border-radius: 16px; padding: 20px; border: 1px solid var(--border-color); height: fit-content; }
    .problem-title { font-family: 'Noto Serif SC', serif; font-size: 1.3rem; font-weight: 600; margin-bottom: 8px; color: var(--text-primary); }
    .problem-meta { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .meta-tag { font-size: 0.8rem; padding: 4px 10px; border-radius: 20px; background: var(--bg-secondary); color: var(--text-secondary); }
    .problem-desc { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border-color); }
    .stats-row { display: flex; gap: 12px; margin-bottom: 16px; }
    .stat-box { flex: 1; text-align: center; padding: 10px; background: var(--bg-secondary); border-radius: 10px; }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 4px; }
    .stat-value { font-size: 1.2rem; font-weight: 600; color: var(--text-primary); }
    .action-buttons { display: flex; flex-direction: column; gap: 10px; }
    .btn { padding: 12px 20px; border-radius: 10px; font-family: inherit; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: all 0.3s ease; border: none; }
    .btn-primary { background: var(--accent-gold); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-medium); }
    .btn-secondary { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-color); }
    .btn-secondary:hover { background: var(--border-color); }
    .btn-danger { background: #FFEBEE; color: #C62828; border: 1px solid #C62828; }
    .btn-danger:hover { background: #FFCDD2; }
    .result-panel { margin-top: 16px; padding: 16px; border-radius: 12px; display: none; }
    .result-panel.correct { display: block; background: #E8F5E9; border-left: 4px solid #2E7D32; }
    .result-panel.wrong { display: block; background: #FFEBEE; border-left: 4px solid #C62828; }
    .result-panel.progress { display: block; background: #E3F2FD; border-left: 4px solid #1976D2; }
    .result-title { font-weight: 600; margin-bottom: 8px; }
    .result-panel.correct .result-title { color: #2E7D32; }
    .result-panel.wrong .result-title { color: #C62828; }
    .result-panel.progress .result-title { color: #1976D2; }
    .result-content { font-size: 0.9rem; line-height: 1.6; color: var(--text-primary); }
    .hint-panel { margin-top: 16px; padding: 12px 16px; background: #FFF8E1; border-radius: 10px; border-left: 4px solid var(--accent-gold); display: none; }
    .hint-panel.visible { display: block; }
    .navigation { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-color); }
    .filter-btn { padding: 6px 14px; font-size: 0.85rem; border-radius: 20px; background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-color); cursor: pointer; transition: all 0.2s; }
    .filter-btn.active { background: var(--accent-gold); color: white; border-color: var(--accent-gold); }
    .filter-btn:hover { opacity: 0.9; }
    .timer { font-size: 1.1rem; font-weight: 600; text-align: center; padding: 8px; background: var(--bg-secondary); border-radius: 8px; margin-bottom: 12px; color: var(--text-primary); font-family: 'JetBrains Mono', monospace; }
    .timer.paused { opacity: 0.6; }
    .step-indicator { display: flex; gap: 8px; justify-content: center; margin-bottom: 12px; flex-wrap: wrap; }
    .step-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--bg-secondary); border: 2px solid var(--border-color); transition: all 0.3s; }
    .step-dot.active { background: var(--accent-gold); border-color: var(--accent-gold); transform: scale(1.2); }
    .step-dot.done { background: #2E7D32; border-color: #2E7D32; }
    .step-dot.current { background: #1976D2; border-color: #1976D2); animation: pulse-dot 1s infinite; }
    @keyframes pulse-dot { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
    .step-hint { font-size: 0.9rem; color: #1976D2; text-align: center; padding: 8px; background: #E3F2FD; border-radius: 8px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="practice.html" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.85rem;">← 返回列表</a>
      <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>
    </div>

    <div class="tsumego-container">
      <div class="board-section">
        <div class="board-wrapper">
          <div class="goban" id="goban"></div>
        </div>
        <div class="navigation">
          <button class="btn btn-secondary" id="prevBtn">← 上一题</button>
          <button class="btn btn-secondary" id="nextBtn">下一题 →</button>
        </div>
      </div>

      <div class="info-panel">
        <div class="problem-title" id="problemTitle">加载中...</div>
        <div class="problem-meta" id="problemMeta"></div>
        <div class="problem-desc" id="problemDesc"></div>
        
        <div class="step-indicator" id="stepIndicator"></div>
        <div class="step-hint" id="stepHint"></div>

        <div style="margin-bottom: 16px;">
          <button class="btn btn-danger" id="wrongListBtn" style="padding: 10px 16px; font-size: 0.9rem;">📚 错题本 (<span id="wrongCount">0</span>)</button>
        </div>

        <div class="timer" id="timer">00:00</div>

        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-label">尝试次数</div>
            <div class="stat-value" id="attempts">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">正确次数</div>
            <div class="stat-value" id="correct">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">最佳时间</div>
            <div class="stat-value" id="bestTime">--</div>
          </div>
        </div>

        <div class="action-buttons">
          <button class="btn btn-secondary" id="hintBtn">💡 提示</button>
          <button class="btn btn-secondary" id="resetBtn">🔄 重置</button>
          <button class="btn btn-secondary" id="answerBtn">📖 查看答案</button>
        </div>

        <div class="hint-panel" id="hintPanel">
          <div class="result-title">💡 提示</div>
          <div class="result-content" id="hintContent"></div>
        </div>

        <div class="result-panel" id="resultPanel">
          <div class="result-title" id="resultTitle"></div>
          <div class="result-content" id="resultContent"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/tsumego-data.js"></script>
  <script src="../js/tsumego-storage.js"></script>
  <script>
    class SoundEffects {
      constructor() {
        this.ctx = null;
        this.enabled = true;
      }
      
      init() {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
      }
      
      playStone() {
        if (!this.enabled) return;
        this.init();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.frequency.value = 800;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.1);
      }
      
      playCorrect() {
        if (!this.enabled) return;
        this.init();
        const notes = [523.25, 659.25, 783.99];
        notes.forEach((freq, i) => {
          setTimeout(() => {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.frequency.value = freq;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
            osc.start();
            osc.stop(this.ctx.currentTime + 0.3);
          }, i * 150);
        });
      }
      
      playWrong() {
        if (!this.enabled) return;
        this.init();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.frequency.value = 200;
        osc.type = 'sawtooth';
        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.3);
      }
    }
    
    const sound = new SoundEffects();

    class TsumegoApp {
      constructor() {
        this.problem = null;
        this.problemId = null;
        this.currentStep = 0;
        this.isFinished = false;
        this.showedHint = false;
        this.showedAnswer = false;
        this.userMoves = [];
        this.autoStones = [];
        this.currentLocation = '全部';
        this.timerStart = 0;
        this.timerInterval = null;
        this.elapsedTime = 0;
        this.totalSteps = 1;
        this.completedSteps = 0;
        this.init();
      }

      init() {
        ThemeManager.init();
        document.getElementById('themeToggle').addEventListener('click', () => ThemeManager.toggle());

        const params = new URLSearchParams(window.location.search);
        this.problemId = parseInt(params.get('id')) || 1;
        
        this.updateWrongCount();
        this.loadProblem(this.problemId);
        this.bindEvents();
      }

      startTimer() {
        this.timerStart = Date.now() - this.elapsedTime;
        this.timerInterval = setInterval(() => {
          this.elapsedTime = Date.now() - this.timerStart;
          this.updateTimerDisplay();
        }, 1000);
      }

      pauseTimer() {
        if (this.timerInterval) {
          clearInterval(this.timerInterval);
          this.timerInterval = null;
        }
        document.getElementById('timer').classList.add('paused');
      }

      resetTimer() {
        this.pauseTimer();
        this.elapsedTime = 0;
        this.updateTimerDisplay();
        document.getElementById('timer').classList.remove('paused');
      }

      updateTimerDisplay() {
        const seconds = Math.floor(this.elapsedTime / 1000);
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        document.getElementById('timer').textContent = 
          `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      }

      updateWrongCount() {
        const wrongList = TsumegoStorage.getWrongList();
        document.getElementById('wrongCount').textContent = wrongList.length;
      }

      getFilteredProblems() {
        if (this.currentLocation === '全部') {
          return TsumegoData.getAll();
        }
        return TsumegoData.getByLocation(this.currentLocation);
      }

      isMultiStepProblem() {
        return this.problem && this.problem.steps && this.problem.steps.length > 1;
      }

      loadProblem(id) {
        this.problem = TsumegoData.getById(id);
        if (!this.problem) {
          showToast('题目不存在', 'error');
          window.location.href = 'practice.html';
          return;
        }
        this.problemId = id;
        this.currentStep = 0;
        this.isFinished = false;
        this.showedHint = false;
        this.showedAnswer = false;
        this.userMoves = [];
        this.autoStones = [];
        this.totalSteps = this.isMultiStepProblem() ? this.problem.steps.length : 1;
        this.completedSteps = 0;
        
        this.resetTimer();
        this.startTimer();
        
        document.getElementById('resultPanel').className = 'result-panel';
        document.getElementById('hintPanel').classList.remove('visible');
        
        this.renderBoard();
        this.updateUI();
        
        window.history.replaceState(null, '', `?id=${id}`);
      }

      updateStepIndicator() {
        const indicator = document.getElementById('stepIndicator');
        const hint = document.getElementById('stepHint');
        
        if (this.isMultiStepProblem()) {
          indicator.style.display = 'flex';
          hint.style.display = 'block';
          
          let dots = '';
          for (let i = 0; i < this.totalSteps; i++) {
            let cls = 'step-dot';
            if (i < this.completedSteps) cls += ' done';
            else if (i === this.currentStep) cls += ' current';
            dots += `<div class="${cls}"></div>`;
          }
          indicator.innerHTML = dots;
          
          hint.textContent = this.problem.steps[this.currentStep].description;
        } else {
          indicator.style.display = 'none';
          hint.style.display = 'none';
        }
      }

      renderBoard() {
        const goban = document.getElementById('goban');
        const size = this.problem.size;
        const cellSize = 40;
        const boardPadding = 30;
        const boardSize = cellSize * (size - 1) + boardPadding * 2;

        goban.style.width = boardSize + 'px';
        goban.style.height = boardSize + 'px';
        
        const cacheKey = `board_${size}`;
        if (goban.dataset.cacheSize === String(size)) {
          const stones = goban.querySelectorAll('.stone');
          stones.forEach(s => s.remove());
          this.placeSetupStones();
          return;
        }
        
        goban.innerHTML = '';
        goban.dataset.cacheSize = size;

        const svgNS = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(svgNS, 'svg');
        svg.setAttribute('class', 'board-grid');
        svg.setAttribute('width', boardSize);
        svg.setAttribute('height', boardSize);
        svg.setAttribute('viewBox', '0 0 ' + boardSize + ' ' + boardSize);

        for (let i = 0; i < size; i++) {
          const pos = boardPadding + i * cellSize;
          const hLine = document.createElementNS(svgNS, 'line');
          hLine.setAttribute('class', 'grid-line');
          hLine.setAttribute('x1', boardPadding);
          hLine.setAttribute('y1', pos);
          hLine.setAttribute('x2', boardSize - boardPadding);
          hLine.setAttribute('y2', pos);
          svg.appendChild(hLine);

          const vLine = document.createElementNS(svgNS, 'line');
          vLine.setAttribute('class', 'grid-line');
          vLine.setAttribute('x1', pos);
          vLine.setAttribute('y1', boardPadding);
          vLine.setAttribute('x2', pos);
          vLine.setAttribute('y2', boardSize - boardPadding);
          svg.appendChild(vLine);
        }

        const starPoints = this.getStarPoints(size);
        starPoints.forEach(([x, y]) => {
          const circle = document.createElementNS(svgNS, 'circle');
          circle.setAttribute('class', 'star-point');
          circle.setAttribute('cx', boardPadding + x * cellSize);
          circle.setAttribute('cy', boardPadding + y * cellSize);
          circle.setAttribute('r', 3);
          svg.appendChild(circle);
        });

        goban.appendChild(svg);

        for (let y = 0; y < size; y++) {
          for (let x = 0; x < size; x++) {
            const intersection = document.createElement('div');
            intersection.className = 'intersection';
            intersection.dataset.x = x;
            intersection.dataset.y = y;
            intersection.style.left = (boardPadding + x * cellSize) + 'px';
            intersection.style.top = (boardPadding + y * cellSize) + 'px';
            goban.appendChild(intersection);
          }
        }

        this.placeSetupStones();
      }

      getStarPoints(size) {
        const points = [];
        if (size === 9) { points.push([2, 2], [2, 6], [4, 4], [6, 2], [6, 6]); }
        else if (size === 13) { for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) points.push([3 + i * 3, 3 + j * 3]); }
        else { for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) points.push([3 + i * 6, 3 + j * 6]); }
        return points;
      }

      placeSetupStones() {
        const setup = this.problem.setup;
        if (setup.black) {
          setup.black.forEach(([x, y]) => this.placeStone(x, y, 'black', false));
        }
        if (setup.white) {
          setup.white.forEach(([x, y]) => this.placeStone(x, y, 'white', false));
        }
      }

      placeStone(x, y, color, animate = true, className = '') {
        const intersection = document.querySelector('.intersection[data-x="' + x + '"][data-y="' + y + '"]');
        if (!intersection) return;

        const existingStone = intersection.querySelector('.stone');
        if (existingStone) existingStone.remove();

        const stone = document.createElement('div');
        stone.className = 'stone ' + color + (className ? ' ' + className : '');
        intersection.appendChild(stone);
        
        if (animate) {
          requestAnimationFrame(() => stone.classList.add('visible'));
        } else {
          stone.classList.add('visible');
        }
      }

      removeStone(x, y) {
        const intersection = document.querySelector('.intersection[data-x="' + x + '"][data-y="' + y + '"]');
        if (!intersection) return;
        const stone = intersection.querySelector('.stone');
        if (stone) stone.remove();
      }

      removeStoneWithAnimation(x, y) {
        const intersection = document.querySelector('.intersection[data-x="' + x + '"][data-y="' + y + '"]');
        if (!intersection) return;
        const stone = intersection.querySelector('.stone');
        if (stone) {
          stone.classList.remove('visible');
          setTimeout(() => stone.remove(), 200);
        }
      }

      showPreview(x, y) {
        if (this.isFinished || this.showedAnswer) return;
        const intersection = document.querySelector('.intersection[data-x="' + x + '"][data-y="' + y + '"]');
        if (!intersection || intersection.querySelector('.stone')) return;
        this.placeStone(x, y, 'black', false, 'preview');
      }

      hidePreview(x, y) {
        const intersection = document.querySelector('.intersection[data-x="' + x + '"][data-y="' + y + '"]');
        if (!intersection) return;
        const stone = intersection.querySelector('.stone.preview');
        if (stone) stone.remove();
      }

      getCurrentCorrectMoves() {
        if (this.isMultiStepProblem()) {
          return this.problem.steps[this.currentStep].correctMoves;
        }
        return this.problem.correctMoves;
      }

      handleClick(x, y) {
        if (this.isFinished) return;

        const intersection = document.querySelector('.intersection[data-x="' + x + '"][data-y="' + y + '"]');
        if (!intersection || intersection.querySelector('.stone')) return;

        this.placeStone(x, y, 'black', true);
        sound.playStone();
        this.userMoves.push({x, y});

        const correctMoves = this.getCurrentCorrectMoves();
        const isCorrectMove = correctMoves.some(m => m.x === x && m.y === y);
        const stone = intersection.querySelector('.stone');

        if (isCorrectMove) {
          stone.classList.add('correct-move');
          
          if (this.isMultiStepProblem()) {
            this.completedSteps++;
            const stepInfo = this.problem.steps[this.currentStep];
            
            if (stepInfo.afterMoves && stepInfo.afterMoves.white) {
              stepInfo.afterMoves.white.forEach(([wx, wy]) => {
                this.placeStone(wx, wy, 'white', true);
                this.autoStones.push({x: wx, y: wy});
              });
            }
            
            if (this.completedSteps >= this.totalSteps) {
              this.isFinished = true;
              this.pauseTimer();
              TsumegoStats.recordAttempt(this.problemId, true);
              TsumegoStorage.saveBestTime(this.problemId, this.elapsedTime);
              TsumegoStorage.removeFromWrongList(this.problemId);
              this.updateWrongCount();
              this.showResult(true, this.problem.solution);
              sound.playCorrect();
              showToast('回答正确！', 'success');
            } else {
              this.currentStep++;
              this.updateStepIndicator();
              this.showStepProgress();
              sound.playCorrect();
              showToast(`第 ${this.completedSteps} 步正确，继续！`, 'info');
            }
          } else {
            this.isFinished = true;
            this.pauseTimer();
            TsumegoStats.recordAttempt(this.problemId, true);
            TsumegoStorage.saveBestTime(this.problemId, this.elapsedTime);
            TsumegoStorage.removeFromWrongList(this.problemId);
            this.updateWrongCount();
            this.showResult(true, this.problem.solution);
            sound.playCorrect();
            showToast('回答正确！', 'success');
          }
        } else {
          stone.classList.add('wrong-move');
          sound.playWrong();
          
          if (this.isMultiStepProblem()) {
            this.showStepProgress();
          } else {
            this.isFinished = true;
            this.pauseTimer();
            TsumegoStats.recordAttempt(this.problemId, false);
            TsumegoStorage.addToWrongList(this.problemId);
            this.updateWrongCount();
            this.showResult(false, this.problem.wrongMoveHint);
            showToast('回答错误，请继续尝试', 'warning');
          }
        }
        this.updateUI();
      }

      showStepProgress() {
        const panel = document.getElementById('resultPanel');
        panel.className = 'result-panel progress';
        document.getElementById('resultTitle').textContent = `已完成 ${this.completedSteps}/${this.totalSteps} 步`;
        document.getElementById('resultContent').textContent = this.problem.steps[this.currentStep - 1]?.solution || '继续下一步！';
      }

      showResult(isCorrect, message) {
        const panel = document.getElementById('resultPanel');
        panel.className = 'result-panel ' + (isCorrect ? 'correct' : 'wrong');
        document.getElementById('resultTitle').textContent = isCorrect ? '✓ 回答正确！' : '✗ 回答错误';
        document.getElementById('resultContent').textContent = message;
      }

      updateUI() {
        const stats = TsumegoStats.get(this.problemId);
        document.getElementById('problemTitle').textContent = this.problem.title;
        document.getElementById('problemDesc').textContent = this.problem.description;
        
        const metaHtml = `
          <span class="meta-tag">${this.problem.difficulty}</span>
          <span class="meta-tag">${this.problem.location}</span>
          <span class="meta-tag">${this.problem.type === 'kill' ? '杀棋' : '活棋'}</span>
          ${this.isMultiStepProblem() ? `<span class="meta-tag">${this.totalSteps}步题</span>` : ''}
        `;
        document.getElementById('problemMeta').innerHTML = metaHtml;
        
        document.getElementById('attempts').textContent = stats.attempts;
        document.getElementById('correct').textContent = stats.correct;
        document.getElementById('bestTime').textContent = 
          TsumegoStorage.formatTime(TsumegoStorage.getBestTime(this.problemId));

        this.updateStepIndicator();

        const hintPanel = document.getElementById('hintPanel');
        const hintContent = document.getElementById('hintContent');
        if (this.showedHint) {
          hintPanel.classList.add('visible');
          hintContent.textContent = this.problem.hint || '请仔细思考要点...';
        } else {
          hintPanel.classList.remove('visible');
        }

        const filtered = this.getFilteredProblems();
        const currentIndex = filtered.findIndex(p => p.id === this.problemId);
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        prevBtn.disabled = currentIndex <= 0;
        nextBtn.disabled = currentIndex >= filtered.length - 1;
      }

      showHint() {
        this.showedHint = true;
        this.updateUI();
      }

      reset() {
        this.userMoves.forEach(move => this.removeStoneWithAnimation(move.x, move.y));
        this.userMoves = [];

        this.autoStones.forEach(move => this.removeStone(move.x, move.y));
        this.autoStones = [];

        this.currentStep = 0;
        this.isFinished = false;
        this.showedHint = false;
        this.showedAnswer = false;
        this.completedSteps = 0;

        document.getElementById('resultPanel').className = 'result-panel';
        document.getElementById('hintPanel').classList.remove('visible');

        this.resetTimer();
        this.startTimer();

        this.updateUI();
        showToast('已重置', 'info');
      }

      showAnswer() {
        this.showedAnswer = true;
        this.pauseTimer();

        document.getElementById('resultPanel').className = 'result-panel';

        if (this.isMultiStepProblem()) {
          let answerText = '答案：\n';
          this.problem.steps.forEach((step, i) => {
            const move = step.correctMoves[0];
            this.placeStone(move.x, move.y, 'black', true);
            this.autoStones.push({x: move.x, y: move.y});
            answerText += `第${i+1}步：(${move.x}, ${move.y}) - ${step.solution}\n`;
          });
          this.showAnswerPanel(answerText);
        } else {
          const correct = this.problem.correctMoves[0];
          this.placeStone(correct.x, correct.y, 'black', true);
          this.autoStones.push({x: correct.x, y: correct.y});
          this.showAnswerPanel(this.problem.solution);
        }
      }

      showAnswerPanel(message) {
        const panel = document.getElementById('resultPanel');
        panel.className = 'result-panel';
        panel.style.display = 'block';
        panel.style.background = '#E3F2FD';
        panel.style.borderLeft = '4px solid #1976D2';
        document.getElementById('resultTitle').textContent = '📖 答案';
        document.getElementById('resultTitle').style.color = '#1976D2';
        document.getElementById('resultContent').textContent = message;
      }

      showWrongList() {
        const wrongList = TsumegoStorage.getWrongList();
        if (wrongList.length === 0) {
          showToast('错题本为空，继续加油！', 'info');
          return;
        }
        this.loadProblem(wrongList[0]);
        showToast(`进入错题本，共 ${wrongList.length} 题`, 'info');
      }

      setLocationFilter(location) {
        this.currentLocation = location;
        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.location === location);
        });
        
        const filtered = this.getFilteredProblems();
        if (filtered.length > 0) {
          if (!filtered.find(p => p.id === this.problemId)) {
            this.loadProblem(filtered[0].id);
          } else {
            this.updateUI();
          }
        }
      }

      bindEvents() {
        document.getElementById('goban').addEventListener('click', (e) => {
          const intersection = e.target.closest('.intersection');
          if (intersection) {
            const x = parseInt(intersection.dataset.x);
            const y = parseInt(intersection.dataset.y);
            this.handleClick(x, y);
          }
        });

        document.getElementById('goban').addEventListener('mouseover', (e) => {
          const intersection = e.target.closest('.intersection');
          if (intersection) {
            const x = parseInt(intersection.dataset.x);
            const y = parseInt(intersection.dataset.y);
            this.showPreview(x, y);
          }
        });

        document.getElementById('goban').addEventListener('mouseout', (e) => {
          const intersection = e.target.closest('.intersection');
          if (intersection) {
            const x = parseInt(intersection.dataset.x);
            const y = parseInt(intersection.dataset.y);
            this.hidePreview(x, y);
          }
        });

        document.getElementById('hintBtn').addEventListener('click', () => this.showHint());
        document.getElementById('resetBtn').addEventListener('click', () => this.reset());
        document.getElementById('answerBtn').addEventListener('click', () => this.showAnswer());
        document.getElementById('wrongListBtn').addEventListener('click', () => this.showWrongList());

        document.getElementById('prevBtn').addEventListener('click', () => {
          const filtered = this.getFilteredProblems();
          const idx = filtered.findIndex(p => p.id === this.problemId);
          if (idx > 0) this.loadProblem(filtered[idx - 1].id);
        });
        document.getElementById('nextBtn').addEventListener('click', () => {
          const filtered = this.getFilteredProblems();
          const idx = filtered.findIndex(p => p.id === this.problemId);
          if (idx < filtered.length - 1) this.loadProblem(filtered[idx + 1].id);
        });
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      try { new TsumegoApp(); } catch (e) { console.error(e); showErrorBoundary('加载失败'); }
    });
  </script>
</body>
</html>
