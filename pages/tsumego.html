<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>死活题 - 围棋对弈复盘</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .tsumego-container { display: grid; grid-template-columns: 1fr 320px; gap: 24px; max-width: 1200px; margin: 0 auto; }
    @media (max-width: 900px) { .tsumego-container { grid-template-columns: 1fr; } }
    .board-section { display: flex; flex-direction: column; align-items: center; }
    .board-wrapper { position: relative; background: linear-gradient(145deg, var(--board-wood-light) 0%, var(--board-wood) 50%, var(--board-dark) 100%); border-radius: 8px; padding: 30px; box-shadow: var(--shadow-medium); }
    .goban { position: relative; background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%); border-radius: 4px; overflow: visible; }
    .board-grid { position: absolute; top: 0; left: 0; pointer-events: none; }
    .grid-line { stroke: var(--line-color); stroke-width: 1.5; opacity: 0.8; }
    .star-point { fill: var(--line-color); opacity: 0.8; }
    .intersection { position: absolute; width: 40px; height: 40px; transform: translate(-50%, -50%); cursor: pointer; z-index: 10; }
    .intersection:hover::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 36px; height: 36px; border-radius: 50%; background: rgba(102, 126, 234, 0.3); pointer-events: none; }
    .stone { width: 36px; height: 36px; border-radius: 50%; position: absolute; transform: scale(0); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 20; }
    .stone.visible { transform: scale(1); }
    .stone.black { background: radial-gradient(circle at 30% 30%, var(--stone-black-highlight), var(--stone-black) 60%); box-shadow: 2px 3px 6px rgba(0, 0, 0, 0.4); }
    .stone.white { background: radial-gradient(circle at 30% 30%, #ffffff, var(--stone-white) 50%, var(--stone-white-shadow) 100%); box-shadow: 2px 3px 6px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0, 0, 0, 0.1); }
    .info-panel { background: var(--card-bg); border-radius: 16px; padding: 20px; border: 1px solid var(--border-color); height: fit-content; }
    .problem-title { font-family: 'Noto Serif SC', serif; font-size: 1.3rem; font-weight: 600; margin-bottom: 8px; color: var(--text-primary); }
    .problem-desc { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border-color); }
    .stats-row { display: flex; gap: 16px; margin-bottom: 20px; }
    .stat-box { flex: 1; text-align: center; padding: 12px; background: var(--bg-secondary); border-radius: 10px; }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 4px; }
    .stat-value { font-size: 1.3rem; font-weight: 600; color: var(--text-primary); }
    .action-buttons { display: flex; flex-direction: column; gap: 10px; }
    .btn { padding: 12px 20px; border-radius: 10px; font-family: inherit; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: all 0.3s ease; border: none; }
    .btn-primary { background: var(--accent-gold); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-medium); }
    .btn-secondary { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-color); }
    .btn-secondary:hover { background: var(--border-color); }
    .result-panel { margin-top: 16px; padding: 16px; border-radius: 12px; display: none; }
    .result-panel.correct { display: block; background: #E8F5E9; border-left: 4px solid #2E7D32; }
    .result-panel.wrong { display: block; background: #FFEBEE; border-left: 4px solid #C62828; }
    .result-title { font-weight: 600; margin-bottom: 8px; }
    .result-panel.correct .result-title { color: #2E7D32; }
    .result-panel.wrong .result-title { color: #C62828; }
    .result-content { font-size: 0.9rem; line-height: 1.6; color: var(--text-primary); }
    .hint-panel { margin-top: 16px; padding: 12px 16px; background: #FFF8E1; border-radius: 10px; border-left: 4px solid var(--accent-gold); display: none; }
    .hint-panel.visible { display: block; }
    .navigation { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-color); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="practice.html" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.85rem;">← 返回列表</a>
      <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>
    </div>

    <div class="tsumego-container">
      <div class="board-section">
        <div class="board-wrapper">
          <div class="goban" id="goban"></div>
        </div>
        <div class="navigation">
          <button class="btn btn-secondary" id="prevBtn">← 上一题</button>
          <button class="btn btn-secondary" id="nextBtn">下一题 →</button>
        </div>
      </div>

      <div class="info-panel">
        <div class="problem-title" id="problemTitle">加载中...</div>
        <div class="problem-desc" id="problemDesc"></div>
        
        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-label">尝试次数</div>
            <div class="stat-value" id="attempts">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">正确次数</div>
            <div class="stat-value" id="correct">0</div>
          </div>
        </div>

        <div class="action-buttons">
          <button class="btn btn-secondary" id="hintBtn">💡 提示</button>
          <button class="btn btn-secondary" id="resetBtn">🔄 重置</button>
          <button class="btn btn-secondary" id="answerBtn">📖 查看答案</button>
        </div>

        <div class="hint-panel" id="hintPanel">
          <div class="result-title">💡 提示</div>
          <div class="result-content" id="hintContent"></div>
        </div>

        <div class="result-panel" id="resultPanel">
          <div class="result-title" id="resultTitle"></div>
          <div class="result-content" id="resultContent"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/tsumego-data.js"></script>
  <script>
    class TsumegoApp {
      constructor() {
        this.problem = null;
        this.problemId = null;
        this.currentMoveCount = 0;
        this.maxMoves = 1;
        this.isCorrect = false;
        this.isFinished = false;
        this.showedHint = false;
        this.showedAnswer = false;
        this.userMoves = []; // 记录用户下的位置
        this.init();
      }

      init() {
        ThemeManager.init();
        document.getElementById('themeToggle').addEventListener('click', () => ThemeManager.toggle());

        const params = new URLSearchParams(window.location.search);
        this.problemId = parseInt(params.get('id')) || 1;
        this.loadProblem(this.problemId);
        this.bindEvents();
      }

      loadProblem(id) {
        this.problem = TsumegoData.getById(id);
        if (!this.problem) {
          showToast('题目不存在', 'error');
          window.location.href = 'practice.html';
          return;
        }
        this.problemId = id;
        this.currentMoveCount = 0;
        this.isCorrect = false;
        this.isFinished = false;
        this.showedHint = false;
        this.showedAnswer = false;
        this.userMoves = [];
        
        // 清除上一题的结果面板
        document.getElementById('resultPanel').className = 'result-panel';
        // 清除上一题的提示面板
        document.getElementById('hintPanel').classList.remove('visible');
        
        this.renderBoard();
        this.updateUI();
      }

      renderBoard() {
        const goban = document.getElementById('goban');
        const size = this.problem.size;
        const cellSize = 40;
        const boardPadding = 30;
        const boardSize = cellSize * (size - 1) + boardPadding * 2;

        goban.style.width = boardSize + 'px';
        goban.style.height = boardSize + 'px';
        goban.innerHTML = '';

        const svgNS = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(svgNS, 'svg');
        svg.setAttribute('class', 'board-grid');
        svg.setAttribute('width', boardSize);
        svg.setAttribute('height', boardSize);
        svg.setAttribute('viewBox', '0 0 ' + boardSize + ' ' + boardSize);

        for (let i = 0; i < size; i++) {
          const pos = boardPadding + i * cellSize;
          const hLine = document.createElementNS(svgNS, 'line');
          hLine.setAttribute('class', 'grid-line');
          hLine.setAttribute('x1', boardPadding);
          hLine.setAttribute('y1', pos);
          hLine.setAttribute('x2', boardSize - boardPadding);
          hLine.setAttribute('y2', pos);
          svg.appendChild(hLine);

          const vLine = document.createElementNS(svgNS, 'line');
          vLine.setAttribute('class', 'grid-line');
          vLine.setAttribute('x1', pos);
          vLine.setAttribute('y1', boardPadding);
          vLine.setAttribute('x2', pos);
          vLine.setAttribute('y2', boardSize - boardPadding);
          svg.appendChild(vLine);
        }

        const starPoints = this.getStarPoints(size);
        starPoints.forEach(([x, y]) => {
          const circle = document.createElementNS(svgNS, 'circle');
          circle.setAttribute('class', 'star-point');
          circle.setAttribute('cx', boardPadding + x * cellSize);
          circle.setAttribute('cy', boardPadding + y * cellSize);
          circle.setAttribute('r', 3);
          svg.appendChild(circle);
        });

        goban.appendChild(svg);

        for (let y = 0; y < size; y++) {
          for (let x = 0; x < size; x++) {
            const intersection = document.createElement('div');
            intersection.className = 'intersection';
            intersection.dataset.x = x;
            intersection.dataset.y = y;
            intersection.style.left = (boardPadding + x * cellSize) + 'px';
            intersection.style.top = (boardPadding + y * cellSize) + 'px';
            goban.appendChild(intersection);
          }
        }

        this.placeSetupStones();
      }

      getStarPoints(size) {
        const points = [];
        if (size === 9) { points.push([2, 2], [2, 6], [4, 4], [6, 2], [6, 6]); }
        else if (size === 13) { for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) points.push([3 + i * 3, 3 + j * 3]); }
        else { for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) points.push([3 + i * 6, 3 + j * 6]); }
        return points;
      }

      placeSetupStones() {
        const setup = this.problem.setup;
        if (setup.black) {
          setup.black.forEach(([x, y]) => this.placeStone(x, y, 'black', false));
        }
        if (setup.white) {
          setup.white.forEach(([x, y]) => this.placeStone(x, y, 'white', false));
        }
      }

      placeStone(x, y, color, animate = true) {
        const intersection = document.querySelector('.intersection[data-x="' + x + '"][data-y="' + y + '"]');
        if (!intersection) return;

        const existingStone = intersection.querySelector('.stone');
        if (existingStone) existingStone.remove();

        const stone = document.createElement('div');
        stone.className = 'stone ' + color;
        intersection.appendChild(stone);
        if (animate) {
          requestAnimationFrame(() => stone.classList.add('visible'));
        } else {
          stone.classList.add('visible');
        }
      }

      removeStone(x, y) {
        const intersection = document.querySelector('.intersection[data-x="' + x + '"][data-y="' + y + '"]');
        if (!intersection) return;
        const stone = intersection.querySelector('.stone');
        if (stone) {
          stone.classList.remove('visible');
          setTimeout(() => stone.remove(), 200);
        }
      }

      handleClick(x, y) {
        if (this.isFinished || this.showedAnswer) return;

        const intersection = document.querySelector('.intersection[data-x="' + x + '"][data-y="' + y + '"]');
        if (!intersection || intersection.querySelector('.stone')) return;

        this.placeStone(x, y, 'black', true);
        this.userMoves.push({x, y});
        this.currentMoveCount++;

        const isCorrectMove = this.problem.correctMoves.some(m => m.x === x && m.y === y);

        if (isCorrectMove) {
          this.isCorrect = true;
          this.isFinished = true;
          TsumegoStats.recordAttempt(this.problemId, true);
          this.showResult(true);
          showToast('回答正确！', 'success');
          SoundManager && SoundManager.playVictory && SoundManager.playVictory();
        } else {
          this.isFinished = true;
          TsumegoStats.recordAttempt(this.problemId, false);
          this.showResult(false);
          showToast('回答错误，请重试或查看答案', 'warning');
        }
        this.updateUI();
      }

      showResult(isCorrect) {
        const panel = document.getElementById('resultPanel');
        const title = document.getElementById('resultTitle');
        const content = document.getElementById('resultContent');

        panel.className = 'result-panel ' + (isCorrect ? 'correct' : 'wrong');
        title.textContent = isCorrect ? '✓ 回答正确！' : '✗ 回答错误';
        content.textContent = isCorrect ? this.problem.solution : this.problem.wrongMoveHint;
      }

      updateUI() {
        const stats = TsumegoStats.get(this.problemId);
        document.getElementById('problemTitle').textContent = this.problem.title;
        document.getElementById('problemDesc').textContent = this.problem.description;
        document.getElementById('attempts').textContent = stats.attempts;
        document.getElementById('correct').textContent = stats.correct;

        const hintPanel = document.getElementById('hintPanel');
        const hintContent = document.getElementById('hintContent');
        if (this.showedHint) {
          hintPanel.classList.add('visible');
          hintContent.textContent = this.problem.hint || '请仔细思考要点...';
        } else {
          hintPanel.classList.remove('visible');
        }

        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const allProblems = TsumegoData.getAll();
        const currentIndex = allProblems.findIndex(p => p.id === this.problemId);
        prevBtn.disabled = currentIndex <= 0;
        nextBtn.disabled = currentIndex >= allProblems.length - 1;
      }

      showHint() {
        this.showedHint = true;
        this.updateUI();
      }

      reset() {
        // 清除用户下的所有棋子
        this.userMoves.forEach(move => this.removeStone(move.x, move.y));
        this.userMoves = [];
        
        // 重置状态
        this.currentMoveCount = 0;
        this.isCorrect = false;
        this.isFinished = false;
        this.showedHint = false;
        this.showedAnswer = false;
        
        // 隐藏结果面板
        document.getElementById('resultPanel').className = 'result-panel';
        document.getElementById('hintPanel').classList.remove('visible');
        
        this.updateUI();
        showToast('已重置', 'info');
      }

      showAnswer() {
        this.showedAnswer = true;
        const correct = this.problem.correctMoves[0];
        this.placeStone(correct.x, correct.y, 'black', true);

        const panel = document.getElementById('resultPanel');
        panel.className = 'result-panel correct';
        document.getElementById('resultTitle').textContent = '答案';
        document.getElementById('resultContent').textContent = this.problem.solution;
      }

      bindEvents() {
        document.getElementById('goban').addEventListener('click', (e) => {
          const intersection = e.target.closest('.intersection');
          if (intersection) {
            const x = parseInt(intersection.dataset.x);
            const y = parseInt(intersection.dataset.y);
            this.handleClick(x, y);
          }
        });

        document.getElementById('hintBtn').addEventListener('click', () => this.showHint());
        document.getElementById('resetBtn').addEventListener('click', () => this.reset());
        document.getElementById('answerBtn').addEventListener('click', () => this.showAnswer());
        document.getElementById('prevBtn').addEventListener('click', () => {
          const all = TsumegoData.getAll();
          const idx = all.findIndex(p => p.id === this.problemId);
          if (idx > 0) this.loadProblem(all[idx - 1].id);
        });
        document.getElementById('nextBtn').addEventListener('click', () => {
          const all = TsumegoData.getAll();
          const idx = all.findIndex(p => p.id === this.problemId);
          if (idx < all.length - 1) this.loadProblem(all[idx + 1].id);
        });
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      try { new TsumegoApp(); } catch (e) { console.error(e); showErrorBoundary('加载失败'); }
    });
  </script>
</body>
</html>
