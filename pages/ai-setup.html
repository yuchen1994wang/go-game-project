<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 对弈设置 - 围棋对弈复盘</title>
  <meta name="description" content="设置AI对弈参数，选择棋盘大小和AI难度">
  <meta name="keywords" content="围棋,围棋对弈,围棋学习,死活题,棋谱,AI对弈">
  <meta name="author" content="围棋对弈复盘">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="AI 对弈设置 - 围棋对弈复盘">
  <meta property="og:description" content="设置AI对弈参数，选择棋盘大小和AI难度">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="theme-color" content="#C4A35A">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .setup-container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .setup-title { font-family: 'Noto Serif SC', serif; font-size: 1.5rem; font-weight: 600; text-align: center; margin-bottom: 30px; color: var(--text-primary); }
    .setup-section { background: var(--card-bg); border-radius: 16px; padding: 24px; margin-bottom: 20px; border: 1px solid var(--border-color); }
    .section-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 16px; color: var(--text-primary); }
    .option-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .option-card { padding: 16px; border: 2px solid var(--border-color); border-radius: 12px; text-align: center; cursor: pointer; transition: all 0.3s; background: var(--bg-secondary); }
    .option-card:hover { border-color: var(--accent-gold); transform: translateY(-2px); }
    .option-card.selected { border-color: var(--accent-gold); background: var(--accent-gold-light); }
    .option-icon { font-size: 2rem; margin-bottom: 8px; }
    .option-label { font-weight: 600; color: var(--text-primary); }
    .option-desc { font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px; }
    .start-btn { width: 100%; padding: 16px; font-size: 1.1rem; background: var(--accent-gold); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
    .start-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-medium); }
    .start-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    @media (max-width: 480px) { .option-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 480px) { .option-card { padding: 12px 8px; } }
    @media (max-width: 480px) { .option-icon { font-size: 1.5rem; } }
    @media (max-width: 480px) { .option-label { font-size: 0.9rem; } }
    @media (max-width: 480px) { .option-desc { display: none; } }
  </style>
</head>
<body>
  <div class="container">
    <div id="header-container"></div>

    <div class="setup-container">
      <h1 class="setup-title">🤖 AI 对弈设置</h1>

      <div class="setup-section">
        <div class="section-title">📐 棋盘大小</div>
        <div class="board-size-options" id="sizeOptions">
          <button type="button" class="board-size-option" data-size="9">
            <span class="size-number">9</span>
            <span class="size-label">路棋盘</span>
          </button>
          <button type="button" class="board-size-option" data-size="13">
            <span class="size-number">13</span>
            <span class="size-label">路棋盘</span>
          </button>
          <button type="button" class="board-size-option active" data-size="19">
            <span class="size-number">19</span>
            <span class="size-label">路棋盘</span>
          </button>
        </div>
      </div>

      <div class="setup-section">
        <div class="section-title">🎯 AI 难度</div>
        <div class="option-grid" id="levelOptions">
          <div class="option-card selected" data-level="easy">
            <div class="option-icon">🌱</div>
            <div class="option-label">简单</div>
            <div class="option-desc">适合新手</div>
          </div>
          <div class="option-card" data-level="medium">
            <div class="option-icon">🌿</div>
            <div class="option-label">中等</div>
            <div class="option-desc">有一定挑战</div>
          </div>
          <div class="option-card" data-level="hard">
            <div class="option-icon">🌳</div>
            <div class="option-label">困难</div>
            <div class="option-desc">高手对决</div>
          </div>
        </div>
      </div>

      <button class="start-btn" id="startBtn">开始对弈</button>
    </div>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/error-handler.js"></script>
  <script src="../js/loading.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/board-component.js"></script>
  <script src="../js/ai.js"></script>
  <script src="../js/header.js"></script>
  <script>
    class AISetup {
      constructor() {
        this.selectedSize = 19;
        this.selectedLevel = 'easy';
        this.init();
      }

      init() {
        Header.mount(document.getElementById('header-container'), {
          backUrl: 'home.html',
          showSettings: true,
          showUser: true
        });
        this.bindEvents();
      }

      bindEvents() {
        document.querySelectorAll('#sizeOptions .board-size-option').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('#sizeOptions .board-size-option').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.selectedSize = parseInt(btn.dataset.size);
          });
        });

        document.querySelectorAll('#levelOptions .option-card').forEach(card => {
          card.addEventListener('click', () => {
            document.querySelectorAll('#levelOptions .option-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            this.selectedLevel = card.dataset.level;
          });
        });

        document.getElementById('startBtn').addEventListener('click', () => {
          window.location.href = `ai-match.html?size=${this.selectedSize}&level=${this.selectedLevel}`;
        });
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      new AISetup();
    });
  </script>
</body>
</html>
