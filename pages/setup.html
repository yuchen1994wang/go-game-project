<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>开始对弈 - 围棋对练复盘</title>
  <meta name="description" content="选择棋盘大小和对手，开始新的围棋对局">
  <meta name="keywords" content="围棋,围棋对弈,围棋学习,死活题,棋谱,AI对弈">
  <meta name="author" content="围棋对弈复盘">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="开始对弈 - 围棋对练复盘">
  <meta property="og:description" content="选择棋盘大小和对手，开始新的围棋对局">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="theme-color" content="#C4A35A">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .setup-page { display: flex; flex-direction: column; min-height: 100vh; }

    header {
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-color);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left { display: flex; align-items: center; gap: 16px; }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .setup-container {
      background: var(--panel-bg);
      border-radius: 24px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: var(--shadow-medium);
      border: 1px solid var(--border-color);
    }

    .setup-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.8rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 32px;
    }

    .setup-section { margin-bottom: 32px; }
    .setup-section:last-child { margin-bottom: 0; }

    .section-label {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 16px;
      color: var(--text-secondary);
    }

    .board-size-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .board-size-option {
      padding: 20px;
      border: 2px solid var(--border-color);
      border-radius: 16px;
      background: var(--bg-secondary);
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }

    .board-size-option:hover {
      border-color: var(--accent-gold);
      transform: translateY(-2px);
    }

    .board-size-option.active {
      border-color: var(--accent-gold);
      background: var(--accent-gold-light);
    }

    .size-number {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2rem;
      font-weight: 700;
      display: block;
      margin-bottom: 4px;
    }

    .size-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .player-options {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .player-option {
      padding: 20px;
      border: 2px solid var(--border-color);
      border-radius: 16px;
      background: var(--bg-secondary);
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }

    .player-option:hover {
      border-color: var(--accent-gold);
      transform: translateY(-2px);
    }

    .player-option.active {
      border-color: var(--accent-gold);
      background: var(--accent-gold-light);
    }

    .player-icon {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }

    .player-name {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .player-desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .start-btn {
      width: 100%;
      padding: 16px;
      font-size: 1.1rem;
      background: var(--accent-gold);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-medium);
    }

    @media (max-width: 480px) {
      .setup-container { padding: 24px; }
      .board-size-options { grid-template-columns: repeat(3, 1fr); }
      .player-options { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="setup-page">
    <header>
      <div class="header-left">
        <a href="home.html" class="logo">
          <div class="logo-icon"></div>
          <h1>围棋对练</h1>
        </a>
      </div>
    </header>

    <main>
      <div class="setup-container">
        <h2 class="setup-title">⚙️ 对局设置</h2>

        <div class="setup-section">
          <div class="section-label">📐 棋盘大小</div>
          <div class="board-size-options" id="sizeOptions">
            <button type="button" class="board-size-option" data-size="9">
              <span class="size-number">9</span>
              <span class="size-label">路棋盘</span>
            </button>
            <button type="button" class="board-size-option" data-size="13">
              <span class="size-number">13</span>
              <span class="size-label">路棋盘</span>
            </button>
            <button type="button" class="board-size-option active" data-size="19">
              <span class="size-number">19</span>
              <span class="size-label">路棋盘</span>
            </button>
          </div>
        </div>

        <div class="setup-section">
          <div class="section-label">👥 对局模式</div>
          <div class="player-options" id="playerOptions">
            <button type="button" class="player-option active" data-mode="pvp">
              <div class="player-icon">👤👤</div>
              <div class="player-name">人人对弈</div>
              <div class="player-desc">两位玩家对局</div>
            </button>
            <button type="button" class="player-option" data-mode="pve">
              <div class="player-icon">👤🤖</div>
              <div class="player-name">人机对弈</div>
              <div class="player-desc">与 AI 对局</div>
            </button>
          </div>
        </div>

        <button class="start-btn" id="startBtn">开始对弈</button>
      </div>
    </main>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/error-handler.js"></script>
  <script src="../js/loading.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/board-component.js"></script>
  <script src="../js/header.js"></script>
  <script>
    class SetupApp {
      constructor() {
        this.selectedSize = 19;
        this.selectedMode = 'pvp';
        this.init();
      }

      init() {
        this.bindEvents();
      }

      bindEvents() {
        document.querySelectorAll('#sizeOptions .board-size-option').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('#sizeOptions .board-size-option').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.selectedSize = parseInt(btn.dataset.size);
          });
        });

        document.querySelectorAll('#playerOptions .player-option').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('#playerOptions .player-option').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.selectedMode = btn.dataset.mode;
          });
        });

        document.getElementById('startBtn').addEventListener('click', () => {
          if (this.selectedMode === 'pve') {
            window.location.href = `ai-setup.html?size=${this.selectedSize}`;
          } else {
            window.location.href = `game.html?size=${this.selectedSize}&black=黑方&white=白方`;
          }
        });
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      new SetupApp();
    });
  </script>
</body>
</html>
