<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>复盘 - 围棋对弈复盘</title>
  <meta name="description" content="围棋对局复盘分析，查看历史对局">
  <meta name="keywords" content="围棋,围棋对弈,围棋学习,死活题,棋谱,AI对弈">
  <meta name="author" content="围棋对弈复盘">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="复盘 - 围棋对弈复盘">
  <meta property="og:description" content="围棋对局复盘分析，查看历史对局">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="theme-color" content="#C4A35A">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .review-page { display: flex; flex-direction: column; min-height: 100vh; }
    header {
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-color);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .game-info { display: flex; align-items: center; gap: 16px; font-size: 0.9rem; color: var(--text-secondary); }
    .game-info-item { display: flex; align-items: center; gap: 6px; }
    .player-info { display: flex; align-items: center; gap: 8px; }
    .player-dot { width: 12px; height: 12px; border-radius: 50%; }
    .player-dot.black { background: radial-gradient(circle at 30% 30%, var(--stone-black-highlight), var(--stone-black) 60%); }
    .player-dot.white { background: radial-gradient(circle at 30% 30%, #ffffff, var(--stone-white) 50%, var(--stone-white-shadow) 100%); border: 1px solid rgba(0,0,0,0.1); }
    main { flex: 1; display: flex; padding: 20px; gap: 20px; max-width: 1400px; margin: 0 auto; width: 100%; }
    .board-section { flex: 1; display: flex; align-items: center; justify-content: center; }
    .board-wrapper { position: relative; background: linear-gradient(145deg, var(--board-wood-light) 0%, var(--board-wood) 50%, var(--board-dark) 100%); border-radius: 8px; padding: 30px; box-shadow: var(--shadow-medium); }
    .goban { position: relative; background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%); border-radius: 4px; overflow: visible; }
    .board-grid { position: absolute; top: 0; left: 0; pointer-events: none; }
    .grid-line { stroke: var(--line-color); stroke-width: 1; opacity: 0.7; }
    .star-point { fill: var(--line-color); }
    .intersection { position: absolute; width: 40px; height: 40px; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; z-index: 10; }
    .stone { width: 36px; height: 36px; border-radius: 50%; position: absolute; transform: scale(0); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 20; }
    .stone.visible { transform: scale(1); }
    .stone.black { background: radial-gradient(circle at 30% 30%, var(--stone-black-highlight), var(--stone-black) 60%); box-shadow: 2px 3px 6px rgba(0, 0, 0, 0.4); }
    .stone.white { background: radial-gradient(circle at 30% 30%, #ffffff, var(--stone-white) 50%, var(--stone-white-shadow) 100%); box-shadow: 2px 3px 6px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0, 0, 0, 0.1); }
    .stone.last-move::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; border-radius: 50%; background: var(--accent-red); box-shadow: 0 0 4px rgba(196, 30, 58, 0.6); }
    .stone .move-number { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace; z-index: 25; pointer-events: none; }
    .stone.black .move-number { color: rgba(255,255,255,0.9); }
    .stone.white .move-number { color: rgba(0,0,0,0.8); }
    .control-panel { width: 380px; background: var(--panel-bg); border-radius: 16px; box-shadow: var(--shadow-medium); border: 1px solid var(--border-color); display: flex; flex-direction: column; overflow: hidden; max-height: calc(100vh - 140px); }
    .panel-section { padding: 16px 20px; border-bottom: 1px solid var(--border-color); }
    .panel-section:last-child { border-bottom: none; }
    .panel-title { font-family: 'Noto Serif SC', serif; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.1em; }
    .playback-controls { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 12px; }
    .control-btn { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--border-color); background: var(--bg-secondary); color: var(--text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; font-size: 1.2rem; }
    .control-btn:hover { border-color: var(--accent-gold); color: var(--accent-gold); transform: scale(1.05); }
    .control-btn.primary { width: 52px; height: 52px; background: var(--accent-gold); border-color: var(--accent-gold); color: white; font-size: 1.4rem; }
    .control-btn.primary:hover { background: #D4A017; transform: scale(1.1); }
    .control-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .progress-bar-container { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .progress-bar { flex: 1; height: 6px; background: var(--bg-secondary); border-radius: 3px; cursor: pointer; position: relative; }
    .progress-fill { height: 100%; background: var(--accent-gold); border-radius: 3px; transition: width 0.3s ease; width: 0%; }
    .progress-text { font-size: 0.8rem; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; min-width: 50px; text-align: right; }
    .game-result { padding: 12px; background: var(--bg-secondary); border-radius: 10px; font-size: 0.9rem; margin-bottom: 12px; }
    .result-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .result-row:last-child { margin-bottom: 0; }
    .result-label { color: var(--text-secondary); }
    .result-value { font-weight: 600; }
    .result-value.winner { color: var(--accent-gold); }
    .move-list { display: flex; flex-direction: column; gap: 4px; max-height: 200px; overflow-y: auto; }
    .move-item { padding: 6px 10px; background: var(--bg-secondary); border-radius: 6px; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: all 0.2s; }
    .move-item:hover { background: var(--border-color); }
    .move-item.active { background: var(--accent-gold); color: white; }
    .move-item-num { min-width: 28px; font-family: 'JetBrains Mono', monospace; }
    .move-item-stone { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .move-item-stone.black { background: var(--stone-black); }
    .move-item-stone.white { background: var(--stone-white); border: 1px solid var(--stone-white-shadow); }
    .move-item-coord { flex: 1; }
    @media (max-width: 900px) { main { flex-direction: column; } .control-panel { width: 100%; max-height: none; } }
  </style>
</head>
<body>
  <div class="review-page">
    <header>
      <div class="header-left">
        <a href="home.html" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.85rem;">← 返回首页</a>
        <div class="game-info">
          <div class="game-info-item">
            <div class="player-info">
              <div class="player-dot black"></div>
              <span id="blackPlayerName">黑方</span>
            </div>
          </div>
          <div class="game-info-item">VS</div>
          <div class="game-info-item">
            <div class="player-info">
              <div class="player-dot white"></div>
              <span id="whitePlayerName">白方</span>
            </div>
          </div>
        </div>
      </div>
      <div class="header-right">
        <div class="game-info-item">
          <span>📅</span>
          <span id="gameDate">--</span>
        </div>
        <div class="game-info-item">
          <span>🎯</span>
          <span id="moveCount">0手</span>
        </div>
      </div>
    </header>

    <main>
      <section class="board-section">
        <div class="board-wrapper">
          <div class="goban" id="goban"></div>
        </div>
      </section>

      <aside class="control-panel">
        <div class="panel-section">
          <h3 class="panel-title">播放控制</h3>
          <div class="playback-controls">
            <button class="control-btn" id="btnFirst" title="第一手">⏮</button>
            <button class="control-btn" id="btnPrev" title="上一手">◀</button>
            <button class="control-btn primary" id="btnPlay" title="播放/暂停">▶</button>
            <button class="control-btn" id="btnNext" title="下一手">▶</button>
            <button class="control-btn" id="btnLast" title="最后一手">⏭</button>
          </div>
          <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <span class="progress-text" id="progressText">0 / 0</span>
          </div>
        </div>

        <div class="panel-section">
          <h3 class="panel-title">对局结果</h3>
          <div class="game-result" id="gameResult">
            <div class="result-row">
              <span class="result-label">棋盘大小</span>
              <span class="result-value" id="boardSize">--</span>
            </div>
            <div class="result-row">
              <span class="result-label">对局结果</span>
              <span class="result-value winner" id="gameResultText">--</span>
            </div>
            <div class="result-row">
              <span class="result-label">黑方用时</span>
              <span class="result-value" id="blackTime">--</span>
            </div>
            <div class="result-row">
              <span class="result-label">白方用时</span>
              <span class="result-value" id="whiteTime">--</span>
            </div>
            <div class="result-row">
              <span class="result-label">提子数</span>
              <span class="result-value" id="captures">--</span>
            </div>
          </div>
        </div>

        <div class="panel-section">
          <h3 class="panel-title">手数记录</h3>
          <div class="move-list" id="moveList"></div>
        </div>
      </aside>
    </main>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/error-handler.js"></script>
  <script src="../js/loading.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/board-component.js"></script>
  <script src="../js/ai.js"></script>
  <script src="../js/header.js"></script>
  <script>
    class ReviewApp {
      constructor() {
        this.game = null;
        this.gameData = null;
        this.cellSize = 40;
        this.boardPadding = 30;
        this.letters = 'ABCDEFGHJKLMNOPQRST';
        this.currentMove = -1;
        this.isPlaying = false;
        this.playInterval = null;
        this.playSpeed = 1000;

        this.init();
      }

      init() {
        Header.init();
        this.loadGame();
      }

      loadGame() {
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('id');

        if (!gameId) {
          window.location.href = 'home.html';
          return;
        }

        const history = Storage.getHistory();
        this.gameData = history.find(g => g.id === gameId);

        if (!this.gameData) {
          showToast('对局不存在', 'error');
          window.location.href = 'home.html';
          return;
        }

        this.initGame();
        this.renderBoard();
        this.updateGameInfo();
        this.updateUI();
        this.renderMoveList();
        this.bindEvents();
      }

      initGame() {
        this.game = new GoGame(this.gameData.size);
      }

      renderBoard() {
        const goban = document.getElementById('goban');
        const size = this.gameData.size;
        const boardSize = this.cellSize * (size - 1) + this.boardPadding * 2;

        goban.style.width = `${boardSize}px`;
        goban.style.height = `${boardSize}px`;
        goban.innerHTML = '';

        const svgNS = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(svgNS, 'svg');
        svg.setAttribute('class', 'board-grid');
        svg.setAttribute('width', boardSize);
        svg.setAttribute('height', boardSize);
        svg.setAttribute('viewBox', `0 0 ${boardSize} ${boardSize}`);

        for (let i = 0; i < size; i++) {
          const pos = this.boardPadding + i * this.cellSize;
          const hLine = document.createElementNS(svgNS, 'line');
          hLine.setAttribute('class', 'grid-line');
          hLine.setAttribute('x1', this.boardPadding);
          hLine.setAttribute('y1', pos);
          hLine.setAttribute('x2', boardSize - this.boardPadding);
          hLine.setAttribute('y2', pos);
          svg.appendChild(hLine);

          const vLine = document.createElementNS(svgNS, 'line');
          vLine.setAttribute('class', 'grid-line');
          vLine.setAttribute('x1', pos);
          vLine.setAttribute('y1', this.boardPadding);
          vLine.setAttribute('x2', pos);
          vLine.setAttribute('y2', boardSize - this.boardPadding);
          svg.appendChild(vLine);
        }

        const starPoints = this.getStarPoints(size);
        starPoints.forEach(([x, y]) => {
          const circle = document.createElementNS(svgNS, 'circle');
          circle.setAttribute('class', 'star-point');
          circle.setAttribute('cx', this.boardPadding + x * this.cellSize);
          circle.setAttribute('cy', this.boardPadding + y * this.cellSize);
          circle.setAttribute('r', size === 9 ? 4 : 3);
          svg.appendChild(circle);
        });

        goban.appendChild(svg);

        for (let y = 0; y < size; y++) {
          for (let x = 0; x < size; x++) {
            const intersection = document.createElement('div');
            intersection.className = 'intersection';
            intersection.dataset.x = x;
            intersection.dataset.y = y;
            intersection.style.left = `${this.boardPadding + x * this.cellSize}px`;
            intersection.style.top = `${this.boardPadding + y * this.cellSize}px`;
            goban.appendChild(intersection);
          }
        }

        this.updateBoard();
      }

      getStarPoints(size) {
        const points = [];
        if (size === 9) {
          points.push([2, 2], [2, 6], [4, 4], [6, 2], [6, 6]);
        } else if (size === 13) {
          for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
              points.push([3 + i * 3, 3 + j * 3]);
            }
          }
        } else {
          for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
              points.push([3 + i * 6, 3 + j * 6]);
            }
          }
        }
        return points;
      }

      updateBoard() {
        const size = this.gameData.size;
        const intersections = document.querySelectorAll('.intersection');

        intersections.forEach(intersection => {
          const x = parseInt(intersection.dataset.x);
          const y = parseInt(intersection.dataset.y);
          const stone = intersection.querySelector('.stone');

          if (stone) stone.remove();

          const cellValue = this.game.board[y][x];
          if (cellValue !== 0) {
            const stoneColor = cellValue === 1 ? 'black' : 'white';
            const isLastMove = this.currentMove >= 0 &&
              this.gameData.moveHistory[this.currentMove] &&
              this.gameData.moveHistory[this.currentMove].x === x &&
              this.gameData.moveHistory[this.currentMove].y === y;

            const newStone = document.createElement('div');
            newStone.className = `stone ${stoneColor}${isLastMove ? ' last-move' : ''}`;
            intersection.appendChild(newStone);
            requestAnimationFrame(() => newStone.classList.add('visible'));
          }
        });
      }

      updateGameInfo() {
        document.getElementById('blackPlayerName').textContent = this.gameData.blackPlayer || '黑方';
        document.getElementById('whitePlayerName').textContent = this.gameData.whitePlayer || '白方';

        const date = new Date(this.gameData.savedAt);
        document.getElementById('gameDate').textContent =
          `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;

        document.getElementById('moveCount').textContent = `${this.gameData.moveHistory.length}手`;
        document.getElementById('boardSize').textContent = `${this.gameData.size}×${this.gameData.size}`;

        if (this.gameData.result) {
          const result = this.gameData.result;
          let resultText = '';
          if (result.winner === 'black') {
            resultText = `黑棋胜 ${result.margin.toFixed(1)} 目`;
          } else if (result.winner === 'white') {
            resultText = `白棋胜 ${result.margin.toFixed(1)} 目`;
          } else {
            resultText = '和棋';
          }
          document.getElementById('gameResultText').textContent = resultText;
        } else {
          document.getElementById('gameResultText').textContent = '未结束';
        }

        const blackMins = Math.floor((this.gameData.blackTime || 0) / 60);
        const blackSecs = (this.gameData.blackTime || 0) % 60;
        document.getElementById('blackTime').textContent =
          `${String(blackMins).padStart(2, '0')}:${String(blackSecs).padStart(2, '0')}`;

        const whiteMins = Math.floor((this.gameData.whiteTime || 0) / 60);
        const whiteSecs = (this.gameData.whiteTime || 0) % 60;
        document.getElementById('whiteTime').textContent =
          `${String(whiteMins).padStart(2, '0')}:${String(whiteSecs).padStart(2, '0')}`;

        document.getElementById('captures').textContent =
          `黑: ${this.gameData.blackCaptures || 0} | 白: ${this.gameData.whiteCaptures || 0}`;
      }

      updateUI() {
        const totalMoves = this.gameData.moveHistory.length;
        const progress = totalMoves > 0 ? ((this.currentMove + 1) / totalMoves) * 100 : 0;
        document.getElementById('progressFill').style.width = `${progress}%`;
        document.getElementById('progressText').textContent = `${this.currentMove + 1} / ${totalMoves}`;

        document.getElementById('btnFirst').disabled = this.currentMove <= -1;
        document.getElementById('btnPrev').disabled = this.currentMove <= -1;
        document.getElementById('btnNext').disabled = this.currentMove >= totalMoves - 1;
        document.getElementById('btnLast').disabled = this.currentMove >= totalMoves - 1;

        document.getElementById('btnPlay').textContent = this.isPlaying ? '⏸' : '▶';

        document.querySelectorAll('.move-item').forEach((item, index) => {
          item.classList.toggle('active', index === this.currentMove);
        });
      }

      renderMoveList() {
        const list = document.getElementById('moveList');
        list.innerHTML = '';

        this.gameData.moveHistory.forEach((move, index) => {
          const item = document.createElement('div');
          item.className = 'move-item';
          item.dataset.index = index;

          const num = document.createElement('span');
          num.className = 'move-item-num';
          num.textContent = index + 1;

          const stone = document.createElement('span');
          stone.className = `move-item-stone ${move.player === 1 ? 'black' : 'white'}`;

          const coord = document.createElement('span');
          coord.className = 'move-item-coord';
          if (move.isPass) {
            coord.textContent = '停一手';
          } else {
            coord.textContent = `${this.letters[move.x]}${this.gameData.size - move.y}`;
          }

          item.appendChild(num);
          item.appendChild(stone);
          item.appendChild(coord);

          item.addEventListener('click', () => {
            this.goToMove(index);
          });

          list.appendChild(item);
        });
      }

      goToMove(index) {
        if (index < -1) index = -1;
        if (index >= this.gameData.moveHistory.length) index = this.gameData.moveHistory.length - 1;

        this.currentMove = index;
        this.replayTo(index);
        this.updateUI();
      }

      replayTo(index) {
        this.game = new GoGame(this.gameData.size);

        for (let i = 0; i <= index; i++) {
          const move = this.gameData.moveHistory[i];
          if (move && !move.isPass) {
            this.game.makeMove(move.x, move.y);
          }
        }

        this.updateBoard();
      }

      nextMove() {
        if (this.currentMove < this.gameData.moveHistory.length - 1) {
          this.currentMove++;
          const move = this.gameData.moveHistory[this.currentMove];
          if (move && !move.isPass) {
            this.game.makeMove(move.x, move.y);
          }
          this.updateBoard();
          this.updateUI();
          return true;
        }
        return false;
      }

      prevMove() {
        if (this.currentMove >= 0) {
          this.currentMove--;
          this.replayTo(this.currentMove);
          this.updateUI();
          return true;
        }
        return false;
      }

      firstMove() {
        this.currentMove = -1;
        this.game = new GoGame(this.gameData.size);
        this.updateBoard();
        this.updateUI();
      }

      lastMove() {
        this.currentMove = this.gameData.moveHistory.length - 1;
        this.replayTo(this.currentMove);
        this.updateUI();
      }

      togglePlay() {
        if (this.isPlaying) {
          this.pause();
        } else {
          this.play();
        }
      }

      play() {
        if (this.currentMove >= this.gameData.moveHistory.length - 1) {
          this.currentMove = -1;
          this.game = new GoGame(this.gameData.size);
          this.updateBoard();
        }

        this.isPlaying = true;
        this.updateUI();

        this.playInterval = setInterval(() => {
          if (!this.nextMove()) {
            this.pause();
          }
        }, this.playSpeed);
      }

      pause() {
        this.isPlaying = false;
        if (this.playInterval) {
          clearInterval(this.playInterval);
          this.playInterval = null;
        }
        this.updateUI();
      }

      bindEvents() {
        document.getElementById('btnFirst').addEventListener('click', () => this.firstMove());
        document.getElementById('btnPrev').addEventListener('click', () => this.prevMove());
        document.getElementById('btnPlay').addEventListener('click', () => this.togglePlay());
        document.getElementById('btnNext').addEventListener('click', () => this.nextMove());
        document.getElementById('btnLast').addEventListener('click', () => this.lastMove());

        document.getElementById('progressBar').addEventListener('click', (e) => {
          const rect = e.currentTarget.getBoundingClientRect();
          const ratio = (e.clientX - rect.left) / rect.width;
          const targetMove = Math.floor(ratio * this.gameData.moveHistory.length);
          this.goToMove(Math.min(targetMove, this.gameData.moveHistory.length - 1));
        });

        document.addEventListener('keydown', (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

          switch (e.key) {
            case 'ArrowLeft':
            case 'ArrowUp':
              e.preventDefault();
              this.prevMove();
              break;
            case 'ArrowRight':
            case 'ArrowDown':
              e.preventDefault();
              this.nextMove();
              break;
            case ' ':
              e.preventDefault();
              this.togglePlay();
              break;
            case 'Home':
              e.preventDefault();
              this.firstMove();
              break;
            case 'End':
              e.preventDefault();
              this.lastMove();
              break;
          }
        });
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      new ReviewApp();
    });
  </script>
</body>
</html>
