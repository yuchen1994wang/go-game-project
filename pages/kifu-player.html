<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>打谱回放 - 围棋对弈复盘</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .kifu-player-page { display: flex; flex-direction: column; min-height: 100vh; }

    header {
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-color);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-right { display: flex; align-items: center; gap: 12px; }

    .kifu-info-header {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .kifu-info-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .kifu-info-players {
      font-size: 0.85rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .player-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .player-indicator.black {
      background: radial-gradient(circle at 30% 30%, var(--stone-black-highlight), var(--stone-black) 60%);
    }

    .player-indicator.white {
      background: radial-gradient(circle at 30% 30%, #ffffff, var(--stone-white) 50%, var(--stone-white-shadow) 100%);
      border: 1px solid rgba(0,0,0,0.1);
    }

    main {
      flex: 1;
      display: flex;
      padding: 20px;
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    .board-section {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .board-wrapper {
      position: relative;
      background: linear-gradient(145deg, var(--board-wood-light) 0%, var(--board-wood) 50%, var(--board-dark) 100%);
      border-radius: 8px;
      padding: 30px;
      box-shadow: var(--shadow-medium);
    }

    .goban {
      position: relative;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
      border-radius: 4px;
      overflow: visible;
    }

    .board-grid {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    .grid-line {
      stroke: var(--line-color);
      stroke-width: 1;
      opacity: 0.7;
    }

    .star-point {
      fill: var(--line-color);
    }

    .intersection {
      position: absolute;
      width: 40px;
      height: 40px;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .stone {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      position: absolute;
      transform: scale(0);
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 20;
    }

    .stone.visible { transform: scale(1); }

    .stone.black {
      background: radial-gradient(circle at 30% 30%, var(--stone-black-highlight), var(--stone-black) 60%);
      box-shadow: 2px 3px 6px rgba(0, 0, 0, 0.4);
    }

    .stone.white {
      background: radial-gradient(circle at 30% 30%, #ffffff, var(--stone-white) 50%, var(--stone-white-shadow) 100%);
      box-shadow: 2px 3px 6px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0, 0, 0, 0.1);
    }

    /* 最后落子标记 */
    .stone.last-move::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent-red);
      box-shadow: 0 0 4px rgba(196, 30, 58, 0.6);
    }

    /* 手数标记 */
    .stone .move-number {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 11px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      z-index: 25;
      pointer-events: none;
    }

    .stone.black .move-number { color: rgba(255,255,255,0.9); }
    .stone.white .move-number { color: rgba(0,0,0,0.8); }

    .control-panel {
      width: 380px;
      background: var(--panel-bg);
      border-radius: 16px;
      box-shadow: var(--shadow-medium);
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      max-height: calc(100vh - 140px);
    }

    .panel-section {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .panel-section:last-child { border-bottom: none; }

    .panel-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* 播放控制 */
    .playback-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .control-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid var(--border-color);
      background: var(--bg-secondary);
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      font-size: 1.2rem;
    }

    .control-btn:hover {
      border-color: var(--accent-gold);
      color: var(--accent-gold);
      transform: scale(1.05);
    }

    .control-btn.primary {
      width: 52px;
      height: 52px;
      background: var(--accent-gold);
      border-color: var(--accent-gold);
      color: white;
      font-size: 1.4rem;
    }

    .control-btn.primary:hover {
      background: #D4A017;
      transform: scale(1.1);
    }

    .control-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* 进度条 */
    .progress-bar-container {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .progress-bar {
      flex: 1;
      height: 6px;
      background: var(--bg-secondary);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent-gold);
      border-radius: 3px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .progress-text {
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      min-width: 50px;
      text-align: right;
    }

    /* 速度控制 */
    .speed-control {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }

    .speed-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .speed-btn {
      padding: 4px 10px;
      border: 1px solid var(--border-color);
      background: transparent;
      border-radius: 12px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .speed-btn:hover, .speed-btn.active {
      background: var(--accent-gold);
      border-color: var(--accent-gold);
      color: white;
    }

    /* 当前手信息 */
    .move-info {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 16px;
    }

    .move-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .move-number-badge {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .move-number-badge.black {
      background: var(--stone-black);
      color: white;
    }

    .move-number-badge.white {
      background: var(--stone-white);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .move-position {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      color: var(--text-primary);
    }

    .move-comment {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-primary);
    }

    /* 手数列表 */
    .move-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 200px;
      overflow-y: auto;
    }

    .move-item {
      padding: 8px 12px;
      background: var(--bg-secondary);
      border-radius: 8px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .move-item:hover {
      background: var(--border-color);
    }

    .move-item.active {
      background: var(--accent-gold);
      color: white;
    }

    .move-item.active .move-item-stone {
      border-color: white;
    }

    .move-item-num {
      min-width: 24px;
      font-family: 'JetBrains Mono', monospace;
    }

    .move-item-stone {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .move-item-stone.black { background: var(--stone-black); }
    .move-item-stone.white { background: var(--stone-white); border: 1px solid var(--stone-white-shadow); }

    .move-item-coord {
      flex: 1;
    }

    /* 棋谱信息 */
    .kifu-detail-info {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .kifu-detail-info p {
      margin-bottom: 6px;
    }

    .kifu-detail-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .kifu-detail-tag {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.75rem;
      background: var(--bg-secondary);
      color: var(--text-secondary);
    }

    @media (max-width: 900px) {
      main { flex-direction: column; }
      .control-panel { width: 100%; max-height: none; }
    }
  </style>
</head>
<body>
  <div class="kifu-player-page">
    <header>
      <div class="header-left">
        <a href="kifu.html" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.85rem;">← 返回列表</a>
        <div class="kifu-info-header">
          <div class="kifu-info-title" id="kifuTitle">加载中...</div>
          <div class="kifu-info-players">
            <span class="player-indicator black"></span>
            <span id="blackPlayer">黑方</span>
            <span style="color: var(--text-secondary);">VS</span>
            <span class="player-indicator white"></span>
            <span id="whitePlayer">白方</span>
            <span style="color: var(--text-secondary); margin-left: 8px;" id="kifuDate"></span>
          </div>
        </div>
      </div>
      <div class="header-right">
      </div>
    </header>

    <main>
      <section class="board-section">
        <div class="board-wrapper">
          <div class="goban" id="goban"></div>
        </div>
      </section>

      <aside class="control-panel">
        <!-- 播放控制 -->
        <div class="panel-section">
          <h3 class="panel-title">播放控制</h3>
          <div class="playback-controls">
            <button class="control-btn" id="btnFirst" title="第一手">⏮</button>
            <button class="control-btn" id="btnPrev" title="上一手">◀</button>
            <button class="control-btn primary" id="btnPlay" title="播放/暂停">▶</button>
            <button class="control-btn" id="btnNext" title="下一手">▶</button>
            <button class="control-btn" id="btnLast" title="最后一手">⏭</button>
          </div>
          <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <span class="progress-text" id="progressText">0 / 0</span>
          </div>
          <div class="speed-control">
            <span class="speed-label">速度:</span>
            <button class="speed-btn" data-speed="2000">慢</button>
            <button class="speed-btn active" data-speed="1000">中</button>
            <button class="speed-btn" data-speed="500">快</button>
          </div>
        </div>

        <!-- 当前手讲解 -->
        <div class="panel-section">
          <h3 class="panel-title">当前手讲解</h3>
          <div class="move-info" id="moveInfo">
            <div class="move-header">
              <div class="move-number-badge black" id="moveBadge">1</div>
              <span class="move-position" id="movePosition">请点击播放开始</span>
            </div>
            <div class="move-comment" id="moveComment">点击播放按钮开始回放棋谱，每步都有详细讲解。</div>
          </div>
        </div>

        <!-- 手数列表 -->
        <div class="panel-section">
          <h3 class="panel-title">手数列表</h3>
          <div class="move-list" id="moveList">
            <!-- 动态生成 -->
          </div>
        </div>

        <!-- 棋谱信息 -->
        <div class="panel-section">
          <h3 class="panel-title">棋谱信息</h3>
          <div class="kifu-detail-info" id="kifuDetailInfo">
            <!-- 动态生成 -->
          </div>
        </div>
      </aside>
    </main>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/kifu-data.js"></script>
  <script>
    class KifuPlayerApp {
      constructor() {
        this.kifu = null;
        this.currentMove = 0;
        this.isPlaying = false;
        this.playInterval = null;
        this.playSpeed = 1000;
        this.cellSize = 40;
        this.boardPadding = 30;
        this.letters = 'ABCDEFGHJKLMNOPQRST';

        this.init();
      }

      init() {
        ThemeManager.init();

        // 加载棋谱
        const urlParams = new URLSearchParams(window.location.search);
        const kifuId = parseInt(urlParams.get('id'));

        if (!kifuId) {
          window.location.href = 'kifu.html';
          return;
        }

        this.kifu = KifuData.getById(kifuId);
        if (!this.kifu) {
          window.location.href = 'kifu.html';
          return;
        }

        this.loadKifuInfo();
        this.renderBoard();
        this.renderCoords();
        this.renderMoveList();
        this.renderKifuDetail();
        this.updateUI();
        this.bindEvents();
      }

      loadKifuInfo() {
        document.getElementById('kifuTitle').textContent = this.kifu.title;
        document.getElementById('blackPlayer').textContent = this.kifu.players.black;
        document.getElementById('whitePlayer').textContent = this.kifu.players.white;
        document.getElementById('kifuDate').textContent = this.kifu.date;
      }

      renderBoard() {
        const goban = document.getElementById('goban');
        const size = this.kifu.size;
        const boardSize = this.cellSize * (size - 1) + this.boardPadding * 2;

        goban.style.width = `${boardSize}px`;
        goban.style.height = `${boardSize}px`;
        goban.innerHTML = '';

        const svgNS = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(svgNS, 'svg');
        svg.setAttribute('class', 'board-grid');
        svg.setAttribute('width', boardSize);
        svg.setAttribute('height', boardSize);
        svg.setAttribute('viewBox', `0 0 ${boardSize} ${boardSize}`);

        for (let i = 0; i < size; i++) {
          const pos = this.boardPadding + i * this.cellSize;

          const hLine = document.createElementNS(svgNS, 'line');
          hLine.setAttribute('class', 'grid-line');
          hLine.setAttribute('x1', this.boardPadding);
          hLine.setAttribute('y1', pos);
          hLine.setAttribute('x2', boardSize - this.boardPadding);
          hLine.setAttribute('y2', pos);
          svg.appendChild(hLine);

          const vLine = document.createElementNS(svgNS, 'line');
          vLine.setAttribute('class', 'grid-line');
          vLine.setAttribute('x1', pos);
          vLine.setAttribute('y1', this.boardPadding);
          vLine.setAttribute('x2', pos);
          vLine.setAttribute('y2', boardSize - this.boardPadding);
          svg.appendChild(vLine);
        }

        const starPoints = this.getStarPoints(size);
        starPoints.forEach(([x, y]) => {
          const circle = document.createElementNS(svgNS, 'circle');
          circle.setAttribute('class', 'star-point');
          circle.setAttribute('cx', this.boardPadding + x * this.cellSize);
          circle.setAttribute('cy', this.boardPadding + y * this.cellSize);
          circle.setAttribute('r', size === 9 ? 4 : 3);
          svg.appendChild(circle);
        });

        goban.appendChild(svg);

        for (let y = 0; y < size; y++) {
          for (let x = 0; x < size; x++) {
            const intersection = document.createElement('div');
            intersection.className = 'intersection';
            intersection.dataset.x = x;
            intersection.dataset.y = y;
            intersection.style.left = `${this.boardPadding + x * this.cellSize}px`;
            intersection.style.top = `${this.boardPadding + y * this.cellSize}px`;
            goban.appendChild(intersection);
          }
        }
      }

      renderCoords() {
        const goban = document.getElementById('goban');
        const size = this.kifu.size;

        // 顶部坐标 (A-T)
        const topCoords = document.createElement('div');
        topCoords.className = 'board-coords coord-top';
        for (let i = 0; i < size; i++) {
          const label = document.createElement('span');
          label.className = 'coord-label';
          label.textContent = this.letters[i] || '';
          topCoords.appendChild(label);
        }
        goban.appendChild(topCoords);

        // 底部坐标
        const bottomCoords = document.createElement('div');
        bottomCoords.className = 'board-coords coord-bottom';
        for (let i = 0; i < size; i++) {
          const label = document.createElement('span');
          label.className = 'coord-label';
          label.textContent = this.letters[i] || '';
          bottomCoords.appendChild(label);
        }
        goban.appendChild(bottomCoords);

        // 左侧坐标 (1-19)
        const leftCoords = document.createElement('div');
        leftCoords.className = 'board-coords coord-left';
        for (let i = 0; i < size; i++) {
          const label = document.createElement('span');
          label.className = 'coord-label';
          label.textContent = size - i;
          leftCoords.appendChild(label);
        }
        goban.appendChild(leftCoords);

        // 右侧坐标
        const rightCoords = document.createElement('div');
        rightCoords.className = 'board-coords coord-right';
        for (let i = 0; i < size; i++) {
          const label = document.createElement('span');
          label.className = 'coord-label';
          label.textContent = size - i;
          rightCoords.appendChild(label);
        }
        goban.appendChild(rightCoords);
      }

      getStarPoints(size) {
        const points = [];
        if (size === 9) {
          points.push([2, 2], [2, 6], [4, 4], [6, 2], [6, 6]);
        } else if (size === 13) {
          for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
              points.push([3 + i * 3, 3 + j * 3]);
            }
          }
        } else {
          for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
              points.push([3 + i * 6, 3 + j * 6]);
            }
          }
        }
        return points;
      }

      renderMoveList() {
        const list = document.getElementById('moveList');
        list.innerHTML = '';

        this.kifu.moves.forEach((move, index) => {
          const item = document.createElement('div');
          item.className = 'move-item';
          item.dataset.index = index;

          const num = document.createElement('span');
          num.className = 'move-item-num';
          num.textContent = index + 1;

          const stone = document.createElement('span');
          stone.className = `move-item-stone ${move.player === 1 ? 'black' : 'white'}`;

          const coord = document.createElement('span');
          coord.className = 'move-item-coord';
          coord.textContent = `${this.letters[move.x]}${this.kifu.size - move.y}`;

          item.appendChild(num);
          item.appendChild(stone);
          item.appendChild(coord);

          item.addEventListener('click', () => {
            this.goToMove(index);
          });

          list.appendChild(item);
        });
      }

      renderKifuDetail() {
        const info = document.getElementById('kifuDetailInfo');
        info.innerHTML = `
          <p><strong>对局结果：</strong>${this.kifu.result}</p>
          <p><strong>棋盘大小：</strong>${this.kifu.size}×${this.kifu.size}</p>
          <p><strong>总手数：</strong>${this.kifu.moves.length}手</p>
          <p>${this.kifu.description}</p>
          <div class="kifu-detail-tags">
            ${this.kifu.tags.map(tag => `<span class="kifu-detail-tag">${tag}</span>`).join('')}
          </div>
        `;
      }

      updateUI() {
        const move = this.kifu.moves[this.currentMove];
        const totalMoves = this.kifu.moves.length;

        // 更新进度
        const progress = totalMoves > 0 ? ((this.currentMove + 1) / totalMoves) * 100 : 0;
        document.getElementById('progressFill').style.width = `${progress}%`;
        document.getElementById('progressText').textContent = `${this.currentMove + 1} / ${totalMoves}`;

        // 更新按钮状态
        document.getElementById('btnFirst').disabled = this.currentMove === 0;
        document.getElementById('btnPrev').disabled = this.currentMove === 0;
        document.getElementById('btnNext').disabled = this.currentMove >= totalMoves - 1;
        document.getElementById('btnLast').disabled = this.currentMove >= totalMoves - 1;

        // 更新播放按钮
        document.getElementById('btnPlay').textContent = this.isPlaying ? '⏸' : '▶';

        // 更新当前手信息
        if (move) {
          const badge = document.getElementById('moveBadge');
          badge.className = `move-number-badge ${move.player === 1 ? 'black' : 'white'}`;
          badge.textContent = this.currentMove + 1;

          document.getElementById('movePosition').textContent =
            `${move.player === 1 ? '黑棋' : '白棋'} ${this.letters[move.x]}${this.kifu.size - move.y}`;
          document.getElementById('moveComment').textContent = move.comment;
        } else {
          document.getElementById('moveBadge').textContent = '-';
          document.getElementById('movePosition').textContent = '请点击播放开始';
          document.getElementById('moveComment').textContent = '点击播放按钮开始回放棋谱，每步都有详细讲解。';
        }

        // 更新手数列表高亮
        document.querySelectorAll('.move-item').forEach((item, index) => {
          item.classList.toggle('active', index === this.currentMove);
        });

        // 滚动到当前手
        const activeItem = document.querySelector('.move-item.active');
        if (activeItem) {
          activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // 更新棋盘
        this.updateBoard();
      }

      updateBoard() {
        const size = this.kifu.size;

        // 清除所有棋子
        document.querySelectorAll('.intersection .stone').forEach(stone => stone.remove());

        // 放置当前步数之前的所有棋子
        for (let i = 0; i <= this.currentMove; i++) {
          const move = this.kifu.moves[i];
          const intersection = document.querySelector(`.intersection[data-x="${move.x}"][data-y="${move.y}"]`);
          if (!intersection) continue;

          const stoneColor = move.player === 1 ? 'black' : 'white';
          const isLastMove = i === this.currentMove;

          const stone = document.createElement('div');
          stone.className = `stone ${stoneColor}${isLastMove ? ' last-move' : ''}`;

          // 添加手数标记（最近10手显示手数）
          if (i >= Math.max(0, this.currentMove - 9)) {
            const num = document.createElement('span');
            num.className = 'move-number';
            num.textContent = i + 1;
            stone.appendChild(num);
          }

          intersection.appendChild(stone);
          requestAnimationFrame(() => stone.classList.add('visible'));
        }
      }

      goToMove(index) {
        if (index < 0) index = 0;
        if (index >= this.kifu.moves.length) index = this.kifu.moves.length - 1;

        this.currentMove = index;
        this.updateUI();
      }

      nextMove() {
        if (this.currentMove < this.kifu.moves.length - 1) {
          this.currentMove++;
          this.updateUI();
          return true;
        }
        return false;
      }

      prevMove() {
        if (this.currentMove > 0) {
          this.currentMove--;
          this.updateUI();
          return true;
        }
        return false;
      }

      firstMove() {
        this.currentMove = 0;
        this.updateUI();
      }

      lastMove() {
        this.currentMove = this.kifu.moves.length - 1;
        this.updateUI();
      }

      togglePlay() {
        if (this.isPlaying) {
          this.pause();
        } else {
          this.play();
        }
      }

      play() {
        if (this.currentMove >= this.kifu.moves.length - 1) {
          this.currentMove = -1;
        }

        this.isPlaying = true;
        this.updateUI();

        this.playInterval = setInterval(() => {
          if (!this.nextMove()) {
            this.pause();
          }
        }, this.playSpeed);
      }

      pause() {
        this.isPlaying = false;
        if (this.playInterval) {
          clearInterval(this.playInterval);
          this.playInterval = null;
        }
        this.updateUI();
      }

      setSpeed(speed) {
        this.playSpeed = speed;
        if (this.isPlaying) {
          this.pause();
          this.play();
        }
      }

      bindEvents() {
        document.getElementById('btnFirst').addEventListener('click', () => this.firstMove());
        document.getElementById('btnPrev').addEventListener('click', () => this.prevMove());
        document.getElementById('btnPlay').addEventListener('click', () => this.togglePlay());
        document.getElementById('btnNext').addEventListener('click', () => this.nextMove());
        document.getElementById('btnLast').addEventListener('click', () => this.lastMove());

        // 进度条点击
        document.getElementById('progressBar').addEventListener('click', (e) => {
          const rect = e.currentTarget.getBoundingClientRect();
          const ratio = (e.clientX - rect.left) / rect.width;
          const targetMove = Math.floor(ratio * this.kifu.moves.length);
          this.goToMove(Math.min(targetMove, this.kifu.moves.length - 1));
        });

        // 速度控制
        document.querySelectorAll('.speed-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.setSpeed(parseInt(btn.dataset.speed));
          });
        });

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

          switch (e.key) {
            case 'ArrowLeft':
            case 'ArrowUp':
              e.preventDefault();
              this.prevMove();
              break;
            case 'ArrowRight':
            case 'ArrowDown':
              e.preventDefault();
              this.nextMove();
              break;
            case ' ':
              e.preventDefault();
              this.togglePlay();
              break;
            case 'Home':
              e.preventDefault();
              this.firstMove();
              break;
            case 'End':
              e.preventDefault();
              this.lastMove();
              break;
          }
        });
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      new KifuPlayerApp();
    });
  </script>
</body>
</html>
